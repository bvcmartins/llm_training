const DATA = {"nodes": [{"id": "mod:anneal", "label": "anneal.py", "kind": "module", "module": "anneal", "source": "\"\"\"Stage 2 — ANNEAL entrypoint (separated from training.py).\n\nShort, reasoning-heavy run on ANNEAL_MIX with a LINEAR LR decay from the\npretrain end-LR down to 0. This is the stage that the original bug turned into\na no-op: it must run `max_steps` *additional* optimizer steps on top of the\npretrain handoff. The engine (`training.py`) now anchors the LR schedule to the\nstage's starting step, so seeding from a step-20000 pretrain checkpoint works.\n\nTypical handoff from pretrain:\n\n  python anneal.py --init-from ../checkpoints/qwen3_v2_pretrain_final.pt\n\nContinue an interrupted anneal (same schedule, model+optimizer restored):\n\n  python anneal.py --resume ../checkpoints/qwen3_v2_anneal_step001000.pt\n\n`--init-from` seeds a NEW anneal stage from prior weights (fresh optimizer) and\ncarries the global step/token counters + per-source doc cursors forward so\ntoken accounting stays cumulative and data isn't re-read. `--resume` continues\nthe SAME anneal run.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport argparse\nimport logging\nimport os\nimport sys\nfrom pathlib import Path\n\nHERE = Path(__file__).resolve().parent\nsys.path.insert(0, str(HERE))\n\nfrom data import ANNEAL_MIX             # noqa: E402\nfrom training import StageConfig        # noqa: E402\n\nV2_DIR = HERE.parent\n\n# Fallback if a seed checkpoint predates stage_cfg and no --lr-peak is given.\nDEFAULT_PRETRAIN_END_LR = 3e-5\n\n\ndef resolve_ckpt(path: Path, ckpt_dir: Path) -> Path:\n    \"\"\"Resolve a checkpoint path independent of the current working directory.\n\n    The docstrings suggest `--init-from ../checkpoints/...`, which only resolves\n    when run from `src/`. If the path doesn't exist as given, fall back to its\n    basename inside `--ckpt-dir` (the absolute default) before giving up.\n    \"\"\"\n    if path.exists():\n        return path\n    fallback = ckpt_dir / path.name\n    if fallback.exists():\n        return fallback\n    raise SystemExit(\n        f\"checkpoint not found: '{path}' (also tried '{fallback}'). \"\n        f\"Pass an existing path via --init-from/--resume, or set --ckpt-dir.\"\n    )\n\n\ndef default_anneal_config(context_length: int, pretrain_end_lr: float) -> StageConfig:\n    \"\"\"Linear decay from the pretrain end-LR to 0, up-weighted math/arxiv mix.\"\"\"\n    return StageConfig(\n        name=\"anneal\", mix=ANNEAL_MIX,\n        max_steps=2_000, lr_peak=pretrain_end_lr, lr_end=0.0,\n        warmup_steps=0, schedule=\"linear\",\n        context_length=context_length,\n    )\n\n\ndef parse_args() -> argparse.Namespace:\n    p = argparse.ArgumentParser(description=\"v3 stage-2 anneal\")\n    p.add_argument(\"--model\", choices=[\"0.6b\", \"1.5b\", \"1.7b\"], default=\"1.5b\")\n    p.add_argument(\"--ckpt-dir\", type=Path, default=V2_DIR / \"checkpoints\")\n    p.add_argument(\"--log-dir\",  type=Path, default=V2_DIR / \"logs\")\n\n    g = p.add_mutually_exclusive_group(required=True)\n    g.add_argument(\"--init-from\", type=Path, default=None,\n                   help=\"seed a NEW anneal stage from this pretrain checkpoint's weights\")\n    g.add_argument(\"--resume\", type=Path, default=None,\n                   help=\"continue an interrupted anneal (model+optimizer+counters)\")\n\n    # Overrides (None -> stage default).\n    p.add_argument(\"--max-steps\",  type=int, default=None)\n    p.add_argument(\"--batch-size\", type=int, default=None)\n    p.add_argument(\"--grad-accum\", type=int, default=None)\n    p.add_argument(\"--lr-peak\",    type=float, default=None,\n                   help=\"anneal peak LR; defaults to the seed checkpoint's pretrain lr_end\")\n    p.add_argument(\"--eval-every\", type=int, default=None)\n    p.add_argument(\"--ckpt-every\", type=int, default=None)\n    p.add_argument(\"--no-wandb\",   action=\"store_true\")\n    p.add_argument(\"--wandb-project\", default=\"llm-training-v2\")\n    p.add_argument(\"--wandb-name\",    default=None)\n    p.add_argument(\"--seed\", type=int, default=123)\n    return p.parse_args()\n\n\ndef main():\n    args = parse_args()\n\n    from logging_utils import setup_logging, log_system_info\n    logger, log_file = setup_logging(\"anneal\", args.log_dir)\n    logger.info(\"=== ANNEAL invocation: %s\", \" \".join(sys.argv))\n\n    import torch\n    from bootstrap import setup_torch, build_model, init_wandb\n    from training import train_stage, load_resume_state, stage_cfg_from_dict\n\n    device = setup_torch(args.seed)\n    log_system_info(logger, device)\n    model, model_cfg = build_model(args.model, device)\n    ctx = model_cfg[\"context_length\"]\n\n    # train_stage handoff kwargs differ between the two entry paths.\n    handoff: dict = {}\n\n    if args.resume is not None:\n        # Continue the SAME anneal — rebuild the exact saved schedule so LR\n        # decay lines up, then let the engine restore model/optimizer/counters.\n        args.resume = resolve_ckpt(args.resume, args.ckpt_dir)\n        payload = torch.load(args.resume, map_location=\"cpu\", weights_only=False)\n        if payload.get(\"stage\") != \"anneal\":\n            raise SystemExit(f\"--resume target is stage '{payload.get('stage')}', not 'anneal'.\")\n        saved = payload.get(\"stage_cfg\")\n        if saved is None:\n            raise SystemExit(f\"--resume target {args.resume} has no stage_cfg (old checkpoint).\")\n        cfg = stage_cfg_from_dict(saved)\n        logger.info(\"resuming anneal from %s (saved lr_peak=%.3e)\", args.resume.name, cfg.lr_peak)\n        handoff[\"resume_from\"] = args.resume\n    else:\n        # Seed a NEW anneal from a pretrain checkpoint: load weights only (fresh\n        # optimizer) and carry global counters + doc cursors forward.\n        args.init_from = resolve_ckpt(args.init_from, args.ckpt_dir)\n        state = load_resume_state(args.init_from, model, optimizer=None)\n        seed_stage = state.get(\"stage\")\n        seed_cfg = state.get(\"stage_cfg\") or {}\n        pretrain_end_lr = args.lr_peak or seed_cfg.get(\"lr_end\", DEFAULT_PRETRAIN_END_LR)\n        logger.info(\"seeding anneal from %s (stage=%s step=%d tokens=%s) -> peak LR=%.3e\",\n                    args.init_from.name, seed_stage, state[\"step\"],\n                    f\"{state['tokens']:,}\", pretrain_end_lr)\n        cfg = default_anneal_config(context_length=ctx, pretrain_end_lr=pretrain_end_lr)\n        handoff.update(\n            starting_step=state[\"step\"],\n            starting_tokens=state[\"tokens\"],\n            skip_docs=state[\"docs_per_source\"],\n        )\n\n    # Apply CLI overrides (after schedule reconstruction so they win).\n    for k in (\"max_steps\", \"batch_size\", \"grad_accum\", \"lr_peak\", \"eval_every\", \"ckpt_every\"):\n        v = getattr(args, k)\n        if v is not None:\n            logger.info(\"override %s: %s -> %s\", k, getattr(cfg, k), v)\n            setattr(cfg, k, v)\n\n    wandb_run = init_wandb(\n        enabled=not args.no_wandb,\n        project=args.wandb_project,\n        name=args.wandb_name or f\"qwen3_{args.model}_anneal\",\n        model_cfg=model_cfg, stage=\"anneal\", stage_cfg=cfg,\n        extra={\n            \"init_from\": str(args.init_from) if args.init_from else None,\n            \"resume\":    str(args.resume) if args.resume else None,\n        },\n    )\n\n    try:\n        summary = train_stage(\n            model=model, cfg=cfg, device=device,\n            ckpt_dir=args.ckpt_dir, wandb_run=wandb_run,\n            **handoff,\n        )\n    finally:\n        if wandb_run is not None:\n            wandb_run.finish()\n\n    logger.info(\"anneal summary: %s\", summary)\n    if sum(summary[\"tokens_per_source\"].values()) == 0:\n        logger.warning(\"anneal consumed 0 tokens — the stage did not actually train; \"\n                       \"check max_steps and the handoff above\")\n    logger.info(\"log written to %s\", log_file)\n\n    # The HF streaming dataloader leaves background download threads alive\n    # (aiohttp + hf_xet's Rust runtime — the cas-bridge.xethub.hf.co fetches).\n    # They aren't joined at shutdown, so normal interpreter finalization tears\n    # their thread-state out and prints a cosmetic\n    # `Fatal Python error: PyGILState_Release` *after* the run is fully done.\n    # Everything we care about is already durable by here (final checkpoint on\n    # disk, wandb.finish() ran in the finally above, log handlers flushed next),\n    # so exit hard to skip the crash-prone finalization. Only reached on success;\n    # an exception still unwinds normally and prints its traceback.\n    logging.shutdown()\n    os._exit(0)\n\n\nif __name__ == \"__main__\":\n    main()\n", "signature": ""}, {"id": "anneal:resolve_ckpt", "label": "resolve_ckpt", "kind": "function", "module": "anneal", "source": "def resolve_ckpt(path: Path, ckpt_dir: Path) -> Path:\n    \"\"\"Resolve a checkpoint path independent of the current working directory.\n\n    The docstrings suggest `--init-from ../checkpoints/...`, which only resolves\n    when run from `src/`. If the path doesn't exist as given, fall back to its\n    basename inside `--ckpt-dir` (the absolute default) before giving up.\n    \"\"\"\n    if path.exists():\n        return path\n    fallback = ckpt_dir / path.name\n    if fallback.exists():\n        return fallback\n    raise SystemExit(\n        f\"checkpoint not found: '{path}' (also tried '{fallback}'). \"\n        f\"Pass an existing path via --init-from/--resume, or set --ckpt-dir.\"\n    )", "signature": ""}, {"id": "anneal:default_anneal_config", "label": "default_anneal_config", "kind": "function", "module": "anneal", "source": "def default_anneal_config(context_length: int, pretrain_end_lr: float) -> StageConfig:\n    \"\"\"Linear decay from the pretrain end-LR to 0, up-weighted math/arxiv mix.\"\"\"\n    return StageConfig(\n        name=\"anne n tears\n    # their thread-state out and prints a cosmetic\n    # `Fatal Python error: PyGILState_Release` *after* the run is fully done.\n    # Everything we care about is already durable by here (final checkpoint on\n    # disk, wandb.finish() ran in the finally above, log handlers flushed next),\n    # so exit hard to skip the crash-prone finalization. Only reached on success;\n    # an exception still unwinds normally and prints its traceback.\n    logging.shutdown()\n    os._exit(0)", "signature": ""}, {"id": "mod:bootstrap", "label": "bootstrap.py", "kind": "module", "module": "bootstrap", "source": "\"\"\"Shared setup for the stage entrypoints (pretrain.py / anneal.py).\n\nKeeps device/seed/model/wandb boilerplate in one place so the two stage\nscripts stay short and differ only in their stage-specific config and handoff\nlogic.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport logging\nimport os\nfrom pathlib import Path\n\nlog = logging.getLogger(\"v2.boot\")\n\nMODEL_CHOICES = (\"0.6b\", \"1.5b\", \"1.7b\")\n\n\ndef setup_torch(seed: int):\n    \"\"\"Set CUDA alloc conf, seeds, matmul precision; return the device.\"\"\"\n    os.environ.setdefault(\"PYTORCH_CUDA_ALLOC_CONF\", \"expandable_segments:True\")\n    import torch\n\n    device = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\n    torch.manual_seed(seed)\n    if device.type == \"cuda\":\n        torch.cuda.manual_seed_all(seed)\n    torch.set_float32_matmul_precision(\"high\")\n    torch.backends.cudnn.benchmark = True\n    log.debug(\"torch set up: device=%s seed=%d\", device, seed)\n    return device\n\n\ndef build_model(model_name: str, device):\n    \"\"\"Instantiate the requested Qwen3 config on `device`; return (model, cfg).\"\"\"\n    from qwen3_model import (\n        Qwen3Model, QWEN3_CONFIG_0_6B, QWEN3_CONFIG_1_5B, QWEN3_CONFIG_1_7B,\n    )\n\n    cfgs = {\"0.6b\": QWEN3_CONFIG_0_6B, \"1.5b\": QWEN3_CONFIG_1_5B, \"1.7b\": QWEN3_CONFIG_1_7B}\n    model_cfg = cfgs[model_name]\n    log.info(\"building model %s on %s (dtype=%s)\", model_name, device, model_cfg[\"dtype\"])\n    model = Qwen3Model(model_cfg).to(device=device, dtype=model_cfg[\"dtype\"])\n    log.info(\"model built: %s params (%s non-embedding)\",\n             f\"{model.num_parameters():,}\", f\"{model.num_parameters(non_embedding=True):,}\")\n    return model, model_cfg\n\n\ndef init_wandb(enabled: bool, project: str, name: str, model_cfg: dict, stage: str, stage_cfg, extra: dict | None = None):\n    \"\"\"Start a wandb run (or return None when disabled).\"\"\"\n    if not enabled:\n        log.info(\"wandb disabled (--no-wandb)\")\n        return None\n    import wandb\n\n    run = wandb.init(\n        project=project,\n        name=name,\n        config={\n            \"model_config\": model_cfg,\n            \"stage\":        stage,\n            \"mix\":          stage_cfg.mix.weights,\n            **(extra or {}),\n            **{k: v for k, v in stage_cfg.__dict__.items() if k != \"mix\"},\n        },\n    )\n    log.info(\"wandb run: project=%s name=%s id=%s\", project, name, run.id)\n    return run\n", "signature": ""}, {"id": "bootstrap:setup_torch", "label": "setup_torch", "kind": "function", "module": "bootstrap", "source": "def setup_torch(seed: int):\n    \"\"\"Set CUDA alloc conf, seeds, matmul precision; return the device.\"\"\"\n    os.environ.setdefault(\"PYTORCH_CUDA_ALLOC_CONF\", \"expandable_segments:True\")\n    import torch\n\n    device = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\n    torch.manual_seed(seed)\n    if device.type == \"cuda\":\n        torch.cuda.manual_seed_all(seed)\n    torch.set_float32_matmul_precision(\"high\")\n    torch.backends.cudnn.benchmark = True\n    log.debug(\"torch set up: device=%s seed=%d\", device, seed)\n    return device", "signature": ""}, {"id": "bootstrap:build_model", "label": "build_model", "kind": "function", "module": "bootstrap", "source": "def build_model(model_name: str, device):\n    \"\"\"Instantiate the requested Qwen3 config on `device`; return (model, cfg).\"\"\"\n    from qwen3_model import (\n        Qwen3Model, QWEN3_CONFIG_0_6B, QWEN3_CONFIG_1_5B, QWEN3_CONFIG_1_7B,\n    )\n\n    cfgs = {\"0.6b\": QWEN3_CONFIG_0_6B, \"1.5b\": QWEN3_CONFIG_1_5B, \"1.7b\": QWEN3_CONFIG_1_7B}\n    model_cfg = cfgs[model_name]\n    log.info(\"building model %s on %s (dtype=%s)\", model_name, device, model_cfg[\"dtype\"])\n    model = Qwen3Model(model_cfg).to(device=device, dtype=model_cfg[\"dtype\"])\n    log.info(\"model built: %s params (%s non-embedding)\",\n             f\"{model.num_parameters():,}\", f\"{model.num_parameters(non_embedding=True):,}\")\n    return model, model_cfg", "signature": ""}, {"id": "bootstrap:init_wandb", "label": "init_wandb", "kind": "function", "module": "bootstrap", "source": "def init_wandb(enabled: bool, project: str, name: str, model_cfg: dict, stage: str, stage_cfg, extra: dict | None = None):\n    \"\"\"Start a wandb run (or return None when disabled).\"\"\"\n    if not enabled:\n        log.info(\"wandb disabled (--no-wandb)\")\n        return None\n    import wandb\n\n    run = wandb.init(\n        project=project,\n        name=name,\n        config={\n            \"model_config\": model_cfg,\n            \"stage\":        stage,\n            \"mix\":          stage_cfg.mix.weights,\n            **(extra or {}),\n            **{k: v for k, v in stage_cfg.__dict__.items() if k != \"mix\"},\n        },\n    )\n    log.info(\"wandb run: project=%s name=%s id=%s\", project, name, run.id)\n    return run", "signature": ""}, {"id": "mod:data", "label": "data.py", "kind": "module", "module": "data", "source": "\"\"\"Multi-source streaming dataloader for v2 training.\n\nEach *source* is a HuggingFace streaming dataset with a name, text field, and a\nhuman label. A *mixture* assigns sampling weights to sources for a given\n*stage* (pre-train mix vs anneal mix).\n\nEvery batch carries a `source_id` tensor so the training loop can log per-source\ntoken counts and the eval loop can hold out per-source validation sets.\n\nSources are config-driven — swap HF dataset ids in SOURCES if a default is wrong\nfor your account or has been renamed. Defaults below are reasonable picks at\nthe time of writing; if a `load_dataset` call fails, change the id here.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport random\nfrom dataclasses import dataclass, field\nfrom typing import Iterator\n\nimport torch\nfrom datasets import load_dataset\nfrom torch.utils.data import IterableDataset, DataLoader\n\nfrom tokenizer import get_tokenizer, eot_id\n\n\n# ---------------------------------------------------------------------------\n# Source registry\n# ---------------------------------------------------------------------------\n\n@dataclass(frozen=True)\nclass SourceSpec:\n    name:        str         # short label used in logs/checkpoints\n    hf_path:     str         # HuggingFace dataset id\n    hf_config:   str | None  # subset/config name (or None)\n    text_field:  str         # which column holds the document text\n    split:       str = \"train\"\n\n\n# Canonical sources — all parquet-native mirrors (no remote loading scripts,\n# which `datasets` ≥3.0 refuses to run). If a default ever breaks, swap the\n# hf_path/hf_config to another parquet mirror.\nSOURCES: dict[str, SourceSpec] = {\n    \"wiki\":          SourceSpec(\"wiki\",          \"wikimedia/wikipedia\",         \"20231101.en\",    \"text\"),\n    \"books\":         SourceSpec(\"books\",         \"emozilla/pg19\",               None,             \"text\"),\n    \"stackoverflow\": SourceSpec(\"stackoverflow\", \"mikex86/stackoverflow-posts\", None,             \"Body\"),\n    \"arxiv\":         SourceSpec(\"arxiv\",         \"neuralwork/arxiver\",          None,             \"markdown\"),\n    \"math\":          SourceSpec(\"math\",          \"open-web-math/open-web-math\", None,             \"text\"),\n    # v3 additions — curated Common-Crawl derivative + dedicated math/science.\n    # All parquet-native streaming sets (verified to stream a row). peS2o uses\n    # the common-pile parquet mirror because the canonical allenai/peS2o is a\n    # (now-unsupported by datasets>=3.0) dataset script.\n    \"fineweb_edu\":   SourceSpec(\"fineweb_edu\",   \"HuggingFaceFW/fineweb-edu\",   \"sample-10BT\",    \"text\"),\n    \"finemath\":      SourceSpec(\"finemath\",      \"HuggingFaceTB/finemath\",      \"finemath-4plus\", \"text\"),\n    \"pes2o\":         SourceSpec(\"pes2o\",         \"common-pile/peS2o\",           None,             \"text\"),\n}\n\n# Stable integer ids for fast tensor tagging.\nSOURCE_IDS: dict[str, int] = {name: i for i, name in enumerate(SOURCES)}\nID_TO_SOURCE: dict[int, str] = {i: name for name, i in SOURCE_IDS.items()}\n\n\n# ---------------------------------------------------------------------------\n# Stage mixtures (Llama 3 style)\n# ---------------------------------------------------------------------------\n\n@dataclass(frozen=True)\nclass StageMix:\n    name:    str\n    weights: dict[str, float]  # source name -> sampling weight (need not sum to 1)\n\n\n# v3 mixtures: science + math heavy. fineweb_edu is the curated-CC web backbone;\n# math = finemath + open-web-math; science papers = arxiv + peS2o.\nPRETRAIN_MIX = StageMix(\n    name=\"pretrain\",\n    weights={\n        \"fineweb_edu\":   0.30,   # curated Common-Crawl (edu/science) backbone\n        \"finemath\":      0.15,   # math  ┐\n        \"math\":          0.15,   #       ┘ = 0.30 math\n        \"pes2o\":         0.13,   # science papers ┐\n        \"arxiv\":         0.12,   #                ┘ = 0.25 science\n        \"stackoverflow\": 0.08,   # code/reasoning\n        \"wiki\":          0.05,\n        \"books\":         0.02,\n    },\n)\n\nANNEAL_MIX = StageMix(\n    name=\"anneal\",\n    weights={\n        \"finemath\":      0.22,   # math  ┐\n        \"math\":          0.18,   #       ┘ = 0.40 math\n        \"pes2o\":         0.18,   # science papers ┐\n        \"arxiv\":         0.12,   #                ┘ = 0.30 science\n        \"fineweb_edu\":   0.15,\n        \"stackoverflow\": 0.10,\n        \"wiki\":          0.03,\n        \"books\":         0.02,\n    },\n)\n\n\n# ---------------------------------------------------------------------------\n# Packed multi-source dataset\n# ---------------------------------------------------------------------------\n\nclass MultiSourcePackedDataset(IterableDataset):\n    \"\"\"Pulls from several streaming sources weighted by a StageMix.\n\n    Each iteration yields (input, target, source_id) where:\n      input  : [context_length] token tensor\n      target : [context_length] tensor, == input shifted left by one\n      source_id : scalar tensor, the source that produced the *first* token\n                  of this window. (Most windows are dominated by one source\n                  because we pack within a per-source buffer.)\n    \"\"\"\n\n    def __init__(\n        self,\n        sources:        dict[str, SourceSpec],\n        mix:            StageMix,\n        context_length: int,\n        seed:           int = 123,\n        skip_docs:      dict[str, int] | None = None,\n        shuffle_buffer: int = 5_000,\n        tokenizer_repo: str = \"Qwen/Qwen3-0.6B-Base\",\n    ):\n        super().__init__()\n        self.sources        = sources\n        self.mix            = mix\n        self.context_length = context_length\n        self.seed           = seed\n        self.skip_docs      = skip_docs or {}\n        self.shuffle_buffer = shuffle_buffer\n        self.tokenizer_repo = tokenizer_repo\n        self._docs_consumed = {name: self.skip_docs.get(name, 0) for name in sources}\n\n        # Resolve weights to a list aligned with self._source_names.\n        self._source_names = [n for n in sources if mix.weights.get(n, 0.0) > 0.0]\n        w = [mix.weights[n] for n in self._source_names]\n        total = sum(w)\n        self._weights = [x / total for x in w]\n\n    @property\n    def docs_consumed(self) -> dict[str, int]:\n        return dict(self._docs_consumed)\n\n    def _build_stream(self, spec: SourceSpec, skip: int):\n        ds = load_dataset(\n            spec.hf_path,\n            name=spec.hf_config,\n            split=spec.split,\n            streaming=True,\n        )\n        if skip:\n            ds = ds.skip(skip)\n        return ds.shuffle(buffer_size=self.shuffle_buffer, seed=self.seed)\n\n    def __iter__(self) -> Iterator[tuple[torch.Tensor, torch.Tensor, torch.Tensor]]:\n        tok = get_tokenizer(self.tokenizer_repo)\n        EOT = eot_id(self.tokenizer_repo)\n\n        # One iterator + buffer per active source.\n        streams = {\n            name: iter(self._build_stream(self.sources[name], self._docs_consumed[name]))\n            for name in self._source_names\n        }\n        buffers: dict[str, list[int]] = {n: [] for n in self._source_names}\n        window  = self.context_length + 1\n        rng     = random.Random(self.seed)\n\n        while True:\n            name = rng.choices(self._source_names, weights=self._weights, k=1)[0]\n            spec = self.sources[name]\n            buf  = buffers[name]\n\n            while len(buf) < window:\n                try:\n                    row = next(streams[name])\n                except StopIteration:\n                    streams[name] = iter(self._build_stream(spec, 0))\n                    self._docs_consumed[name] = 0\n                    continue\n                text = row[spec.text_field]\n                if not isinstance(text, str) or not text:\n                    continue\n                buf.extend(tok.encode(text).ids)\n                buf.append(EOT)\n                self._docs_consumed[name] += 1\n\n            chunk = buf[:window]\n            del buf[:window]\n            t = torch.tensor(chunk, dtype=torch.long)\n            yield t[:-1], t[1:], torch.tensor(SOURCE_IDS[name], dtype=torch.long)\n\n\n# ---------------------------------------------------------------------------\n# Per-source validation\n# ---------------------------------------------------------------------------\n\nclass SingleSourcePackedDataset(IterableDataset):\n    \"\"\"One source only, no shuffling, fixed take — for reproducible val loss.\"\"\"\n\n    def __init__(\n        self,\n        spec:           SourceSpec,\n        context_length: int,\n        val_docs:       int,\n        tokenizer_repo: str = \"Qwen/Qwen3-0.6B-Base\",\n    ):\n        super().__init__()\n        self.spec           = spec\n        self.context_length = context_length\n        self.val_docs       = val_docs\n        self.tokenizer_repo = tokenizer_repo\n\n    def __iter__(self):\n        tok = get_tokenizer(self.tokenizer_repo)\n        EOT = eot_id(self.tokenizer_repo)\n\n        ds = load_dataset(\n            self.spec.hf_path,\n            name=self.spec.hf_config,\n            split=self.spec.split,\n            streaming=True,\n        ).take(self.val_docs)\n\n        window = self.context_length + 1\n        buf: list[int] = []\n        for row in ds:\n            text = row[self.spec.text_field]\n            if not isinstance(text, str) or not text:\n                continue\n            buf.extend(tok.encode(text).ids)\n            buf.append(EOT)\n            while len(buf) >= window:\n                chunk = buf[:window]\n                del buf[:window]\n                t = torch.tensor(chunk, dtype=torch.long)\n                yield t[:-1], t[1:]\n\n\n# ---------------------------------------------------------------------------\n# Builders\n# ---------------------------------------------------------------------------\n\ndef build_train_loader(\n    mix:            StageMix,\n    context_length: int,\n    batch_size:     int,\n    seed:           int = 123,\n    skip_docs:      dict[str, int] | None = None,\n) -> DataLoader:\n    ds = MultiSourcePackedDataset(\n        sources=SOURCES, mix=mix, context_length=context_length,\n        seed=seed, skip_docs=skip_docs,\n    )\n    return DataLoader(ds, batch_size=batch_size, num_workers=0, pin_memory=True)\n\n\ndef build_val_loaders(\n    context_length: int,\n    batch_size:     int,\n    val_docs_per_source: int = 200,\n) -> dict[str, DataLoader]:\n    loaders = {}\n    for name, spec in SOURCES.items():\n        ds = SingleSourcePackedDataset(spec, context_length, val_docs_per_source)\n        loaders[name] = DataLoader(ds, batch_size=batch_size, num_workers=0, pin_memory=True)\n    return loaders\n", "signature": ""}, {"id": "data:SourceSpec", "label": "SourceSpec", "kind": "class", "module": "data", "source": "@dataclass(frozen=True)\nclass SourceSpec:\n    name:        str         # short label used in logs/checkpoints\n    hf_path:     str         # HuggingFace dataset id\n    hf_config:   str | None  # subset/config name (or None)\n    text_field:  str         # which column holds the document text\n    split:       str = \"train\"", "signature": ""}, {"id": "data:StageMix", "label": "StageMix", "kind": "class", "module": "data", "source": "@dataclass(frozen=True)\nclass StageMix:\n    name:    str\n    weights: dict[str, float]  # source name -> sampling weight (need not sum to 1)", "signature": ""}, {"id": "data:MultiSourcePackedDataset", "label": "MultiSourcePackedDataset", "kind": "class", "module": "data", "source": "class MultiSourcePackedDataset(IterableDataset):\n    \"\"\"Pulls from several streaming sources weighted by a StageMix.\n\n    Each iteration yields (input, target, source_id) where:\n      input  : [context_length] token tensor\n      target : [context_length] tensor, == input shifted left by one\n      source_id : scalar tensor, the source that produced the *first* token\n                  of this window. (Most windows are dominated by one source\n                  because we pack within a per-source buffer.)\n    \"\"\"\n\n    def __init__(\n        self,\n        sources: t(n, 0.0) > 0.0]\n        w = [mix.weights[n] for n in self._source_names]\n        total = sum(w)\n        self._weights = [x / total for x in w]", "signature": ""}, {"id": "data:MultiSourcePackedDataset.docs_consumed", "label": "MultiSourcePackedDataset.docs_consumed", "kind": "method", "module": "data", "source": "    @property\n    def docs_consumed(self) -> dict[str, int]:\n        return dict(self._docs_consumed)", "signature": ""}, {"id": "data:MultiSourcePackedDataset._build_stream", "label": "MultiSourcePackedDataset._build_stream", "kind": "method", "module": "data", "source": "    def _build_stream(self, spec: SourceSpec, skip: int):\n        ds = load_dataset(\n            spec.hf_path,\n            name=spec.hf_config,\n            split=spec.split,\n            streaming=True,\n        )\n        if skip:\n            ds = ds.skip(skip)\n        return ds.shuffle(buffer_size=self.shuffle_buffer, seed=self.seed)", "signature": ""}, {"id": "data:MultiSourcePackedDataset.__iter__", "label": "MultiSourcePackedDataset.__iter__", "kind": "method", "module": "data", "source": "    def __iter__(self) -> Iterator[tuple[torch.Tensor, torch.Tensor, torch.Tensor]]:\n        tok = get_tokenizer(self.tokenizer_repo)\n        EOT = eot_id(self.tokenizer_repo)\n\n        # One iterator + buffer per active source.\n        streams = {\n            name: iter(self._build_stream(self.sources[name], self._docs_consumed[name]))\n            for name in self._source_names\n        }\n        buffers: dict[str, list[int]] = {n: [] for n in self._source_names}\n        window  = self.context_length + 1\n        rng     = random.Random(self.seed)\n\n        while True:\n            name = rng.choices(self._source_names, weights=self._weights, k=1)[0]\n            spec = self.sources[name]\n            buf  = buffers[name]\n\n            while len(buf) < window:\n                try:\n                    row = next(streams[name])\n                except StopIteration:\n                    streams[name] = iter(self._build_stream(spec, 0))\n                    self._docs_consumed[name] = 0\n                    continue\n                text = row[spec.text_field]\n                if not isinstance(text, str) or not text:\n                    continue\n                buf.extend(tok.encode(text).ids)\n                buf.append(EOT)\n                self._docs_consumed[name] += 1\n\n            chunk = buf[:window]\n            del buf[:window]\n            t = torch.tensor(chunk, dtype=torch.long)\n            yield t[:-1], t[1:], torch.tensor(SOURCE_IDS[name], dtype=torch.long)", "signature": ""}, {"id": "data:SingleSourcePackedDataset", "label": "SingleSourcePackedDataset", "kind": "class", "module": "data", "source": "class SingleSourcePackedDataset(IterableDataset):\n    \"\"\"One source only, no shuffling, fixed take — for reproducible val loss.\"\"\"\n\n    def __init__(\n        self,\n        spec:           SourceSpec,\n        context_length: int,\n        val_docs:       int,\n        tokenizer_repo: str = \"Qwen/Qwen3-0.6B-Base\",\n    ):\n        super().__init__()\n        self.spec           = spec\n        self.context_length = context_length\n        self.val_docs       = val_docs\n        self.tokenizer_repo = tokenizer_repo\n\n    def __iter__(self):\n        tok = get_tokenizer(self.tokenizer_repo)\n        EOT = eot_id(self.tokenizer_repo)\n\n        ds = load_dataset(\n            self.spec.hf_path,\n            name=self.spec.hf_config,\n            split=self.spec.split,\n            streaming=True,\n        ).take(self.val_docs)\n\n        window = self.context_length + 1\n        buf: list[int] = []\n        for row in ds:\n            text = row[self.spec.text_field]\n            if not isinstance(text, str) or not text:\n                continue\n            buf.extend(tok.encode(text).ids)\n            buf.append(EOT)\n            while len(buf) >= window:\n                chunk = buf[:window]\n                del buf[:window]\n                t = torch.tensor(chunk, dtype=torch.long)\n                yield t[:-1], t[1:]", "signature": ""}, {"id": "data:SingleSourcePackedDataset.__init__", "label": "SingleSourcePackedDataset.__init__", "kind": "method", "module": "data", "source": "    def __init__(\n        self,\n        spec:           SourceSpec,\n        context_length: int,\n        val_docs:       int,\n        tokenizer_repo: str = \"Qwen/Qwen3-0.6B-Base\",\n    ):\n        super().__init__()\n        self.spec           = spec\n        self.context_length = context_length\n        self.val_docs       = val_docs\n        self.tokenizer_repo = tokenizer_repo", "signature": ""}, {"id": "data:SingleSourcePackedDataset.__iter__", "label": "SingleSourcePackedDataset.__iter__", "kind": "method", "module": "data", "source": "    def __iter__(self):\n        tok = get_tokenizer(self.tokenizer_repo)\n        EOT = eot_id(self.tokenizer_repo)\n\n        ds = load_dataset(\n            self.spec.hf_path,\n            name=self.spec.hf_config,\n            split=self.spec.split,\n            streaming=True,\n        ).take(self.val_docs)\n\n        window = self.context_length + 1\n        buf: list[int] = []\n        for row in ds:\n            text = row[self.spec.text_field]\n            if not isinstance(text, str) or not text:\n                continue\n            buf.extend(tok.encode(text).ids)\n            buf.append(EOT)\n            while len(buf) >= window:\n                chunk = buf[:window]\n                del buf[:window]\n                t = torch.tensor(chunk, dtype=torch.long)\n                yield t[:-1], t[1:]", "signature": ""}, {"id": "data:build_train_loader", "label": "build_train_loader", "kind": "function", "module": "data", "source": "def build_train_loader(\n    mix:            StageMix,\n    context_length: int,\n    batch_size:     int,\n    seed:           int = 123,\n    skip_docs:      dict[str, int] | None = None,\n) -> DataLoader:\n    ds = MultiSourcePackedDataset(\n        sources=SOURCES, mix=mix, context_length=context_length,\n        seed=seed, skip_docs=skip_docs,\n    )\n    return DataLoader(ds, batch_size=batch_size, num_workers=0, pin_memory=True)", "signature": ""}, {"id": "data:build_val_loaders", "label": "build_val_loaders", "kind": "function", "module": "data", "source": "def build_val_loaders(\n    context_length: int,\n    batch_size:     int,\n    val_docs_per_source: int = 200,\n) -> dict[str, DataLoader]:\n    loaders = {}\n    for name, spec in SOURCES.items():\n        ds = SingleSourcePackedDataset(spec, context_length, val_docs_per_source)\n        loaders[name] = DataLoader(ds, batch_size=batch_size, num_workers=0, pin_memory=True)\n    return loaders", "signature": ""}, {"id": "mod:eval", "label": "eval.py", "kind": "module", "module": "eval", "source": "\"\"\"Per-domain validation + plateau detection.\n\n`evaluate_per_domain` runs each val loader once and returns a dict of\n{source_name: loss}. Aggregate loss is the simple mean across sources (we don't\nweight by stage mix — we want to know if any single domain is regressing).\n\n`PlateauDetector` watches the aggregate loss and fires when no improvement has\nbeen seen for `patience` consecutive evaluations. Hysteresis via `min_delta`\nprevents firing on noise.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass, field\nfrom typing import Callable\n\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\n\n\n@torch.no_grad()\ndef evaluate_per_domain(\n    model:        nn.Module,\n    val_loaders:  dict,\n    device:       torch.device,\n    max_batches:  int = 20,\n) -> dict[str, float]:\n    \"\"\"Return {source_name: mean_loss}. Also returns 'aggregate' key.\"\"\"\n    model.eval()\n    losses: dict[str, float] = {}\n    for name, loader in val_loaders.items():\n        total, count = 0.0, 0\n        for i, (x, y) in enumerate(loader):\n            if i >= max_batches:\n                break\n            x, y = x.to(device, non_blocking=True), y.to(device, non_blocking=True)\n            logits = model(x)\n            loss = F.cross_entropy(logits.flatten(0, 1), y.flatten())\n            total += loss.item()\n            count += 1\n        losses[name] = total / max(count, 1)\n    model.train()\n    if losses:\n        losses[\"aggregate\"] = sum(v for k, v in losses.items() if k != \"aggregate\") / len(losses)\n    return losses\n\n\n@dataclass\nclass PlateauDetector:\n    \"\"\"Fire when aggregate val loss hasn't improved for `patience` evals.\n\n    `min_delta` is the smallest improvement we consider real. `cooldown` keeps\n    us from firing repeatedly on the same plateau — after a fire, we wait that\n    many evals before becoming armed again.\n    \"\"\"\n    patience:  int                       = 5\n    min_delta: float                     = 1e-3\n    cooldown:  int                       = 5\n    on_fire:   Callable[[dict], None] | None = None\n\n    _best:      float = field(default=float(\"inf\"), init=False)\n    _bad_evals: int   = field(default=0, init=False)\n    _cooldown:  int   = field(default=0, init=False)\n    _history:   list  = field(default_factory=list, init=False)\n\n    def update(self, eval_metrics: dict) -> bool:\n        \"\"\"Call after each evaluation. Returns True iff a plateau just fired.\"\"\"\n        agg = eval_metrics.get(\"aggregate\")\n        if agg is None:\n            return False\n\n        self._history.append(eval_metrics)\n\n        if self._cooldown > 0:\n            self._cooldown -= 1\n            if agg + self.min_delta < self._best:\n                self._best = agg\n            return False\n\n        if agg + self.min_delta < self._best:\n            self._best = agg\n            self._bad_evals = 0\n            return False\n\n        self._bad_evals += 1\n        if self._bad_evals >= self.patience:\n            self._bad_evals = 0\n            self._cooldown = self.cooldown\n            payload = {\n                \"best\":        self._best,\n                \"current\":     agg,\n                \"patience\":    self.patience,\n                \"per_domain\":  {k: v for k, v in eval_metrics.items() if k != \"aggregate\"},\n            }\n            if self.on_fire is not None:\n                self.on_fire(payload)\n            return True\n        return False\n\n    @property\n    def best(self) -> float:\n        return self._best\n", "signature": ""}, {"id": "eval:evaluate_per_domain", "label": "evaluate_per_domain", "kind": "function", "module": "eval", "source": "@torch.no_grad()\ndef evaluate_per_domain(\n    model:        nn.Module,\n    val_loaders:  dict,\n    device:       torch.device,\n    max_batches:  int = 20,\n) -> dict[str, float]:\n    \"\"\"Return {source_name: mean_loss}. Also returns 'aggregate' key.\"\"\"\n    model.eval()\n    losses: dict[str, float] = {}\n    for name, loader in val_loaders.items():\n        total, count = 0.0, 0\n        for i, (x, y) in enumerate(loader):\n            if i >= max_batches:\n                break\n            x, y = x.to(device, non_blocking=True), y.to(device, non_blocking=True)\n            logits = model(x)\n            loss = F.cross_entropy(logits.flatten(0, 1), y.flatten())\n            total += loss.item()\n            count += 1\n        losses[name] = total / max(count, 1)\n    model.train()\n    if losses:\n        losses[\"aggregate\"] = sum(v for k, v in losses.items() if k != \"aggregate\") / len(losses)\n    return losses", "signature": ""}, {"id": "eval:PlateauDetector", "label": "PlateauDetector", "kind": "class", "module": "eval", "source": "@dataclass\nclass PlateauDetector:\n    \"\"\"Fire when aggregate val loss hasn't improved for `patience` evals.\n\n    `min_delta` is the smallest improvement we consider real. `cooldown` keeps\n    us from firing repeatedly on the same plateau — after a fire, we wait that\n    many evals before becoming armed again.\n    \"\"\"\n    patience:  int                       = 5\n    min_delta: float                     = 1e-3\n    cooldown:  int                       = 5\n    on_fire:   Callable[[dict], None] | None = None\n\n    _best:      float = field(default=float(\"inf\"), init=False)\n    _bad_evals: int   = field(default=0, init=False)\n    _cooldown:  int   = field(default=0, init=False)\n    _history:   list  = field(default_factory=list, init=False)\n\n    def update(self, eval_metrics: dict) -> bool:\n        \"\"\"Call after each evaluation. Returns True iff a plateau just fired.\"\"\"\n        agg = eval_metrics.get(\"aggregate\")\n        if agg is None:\n            return False\n\n        self._history.append(eval_metrics)\n\n        if self._cooldown > 0:\n            self._cooldown -= 1\n            if agg + self.min_delta < self._best:\n                self._best = agg\n            return False\n\n        if agg + self.min_delta < self._best:\n            self._best = agg\n            self._bad_evals = 0\n            return False\n\n        self._bad_evals += 1\n        if self._bad_evals >= self.patience:\n            self._bad_evals = 0\n            self._cooldown = self.cooldown\n            payload = {\n                \"best\":        self._best,\n                \"current\":     agg,\n                \"patience\":    self.patience,\n                \"per_domain\":  {k: v for k, v in eval_metrics.items() if k != \"aggregate\"},\n            }\n            if self.on_fire is not None:\n                self.on_fire(payload)\n            return True\n        return False\n\n    @property\n    def best(self) -> float:\n        return self._best", "signature": ""}, {"id": "eval:PlateauDetector.update", "label": "PlateauDetector.update", "kind": "method", "module": "eval", "source": "    def update(self, eval_metrics: dict) -> bool:\n        \"\"\"Call after each evaluation. Returns True iff a plateau just fired.\"\"\"\n        agg = eval_metrics.get(\"aggregate\")\n        if agg is None:\n            return False\n\n        self._history.append(eval_metrics)\n\n        if self._cooldown > 0:\n            self._cooldown -= 1\n            if agg + self.min_delta < self._best:\n                self._best = agg\n            return False\n\n        if agg + self.min_delta < self._best:\n            self._best = agg\n            self._bad_evals = 0\n            return False\n\n        self._bad_evals += 1\n        if self._bad_evals >= self.patience:\n            self._bad_evals = 0\n            self._cooldown = self.cooldown\n            payload = {\n                \"best\":        self._best,\n                \"current\":     agg,\n                \"patience\":    self.patience,\n                \"per_domain\":  {k: v for k, v in eval_metrics.items() if k != \"aggregate\"},\n            }\n            if self.on_fire is not None:\n                self.on_fire(payload)\n            return True\n        return False", "signature": ""}, {"id": "eval:PlateauDetector.best", "label": "PlateauDetector.best", "kind": "method", "module": "eval", "source": "    @property\n    def best(self) -> float:\n        return self._best", "signature": ""}, {"id": "mod:logging_utils", "label": "logging_utils.py", "kind": "module", "module": "logging_utils", "source": "\"\"\"Verbose, dual-sink logging for v2 training/annealing scripts.\n\nEverything routes through the stdlib `logging` module so the engine\n(`training.py`) and the stage entrypoints (`pretrain.py`, `anneal.py`) all\nemit to the same place. `setup_logging(...)` wires two handlers:\n\n  * console (stdout) — what you watch live\n  * a timestamped file under `<v2>/logs/` — the durable record\n\nBoth get full timestamps + level + logger name. Call it once, early, from each\nentrypoint; the engine just does `logging.getLogger(\"v2.train\")` and inherits\nthe handlers.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport logging\nimport platform\nimport sys\nfrom datetime import datetime\nfrom pathlib import Path\n\n# Single namespace root; submodules use \"v2.<x>\" so one config covers all.\nROOT_LOGGER = \"v2\"\n\n_FMT = \"%(asctime)s | %(levelname)-7s | %(name)-12s | %(message)s\"\n_DATEFMT = \"%Y-%m-%d %H:%M:%S\"\n\n\ndef setup_logging(\n    stage: str,\n    log_dir: Path,\n    level: int = logging.DEBUG,\n    console_level: int = logging.INFO,\n) -> tuple[logging.Logger, Path]:\n    \"\"\"Configure console + file logging and return (logger, log_file_path).\n\n    `level` is the floor for the file (keep it DEBUG to capture everything);\n    `console_level` is the floor for stdout (INFO keeps the live view readable\n    while the file still gets DEBUG).\n    \"\"\"\n    log_dir.mkdir(parents=True, exist_ok=True)\n    ts = datetime.now().strftime(\"%Y%m%d_%H%M%S\")\n    log_file = log_dir / f\"{stage}_{ts}.log\"\n\n    logger = logging.getLogger(ROOT_LOGGER)\n    logger.setLevel(min(level, console_level))\n    logger.handlers.clear()  # idempotent across re-runs in the same process\n    logger.propagate = False\n\n    fmt = logging.Formatter(_FMT, datefmt=_DATEFMT)\n\n    fh = logging.FileHandler(log_file, mode=\"w\", encoding=\"utf-8\")\n    fh.setLevel(level)\n    fh.setFormatter(fmt)\n    logger.addHandler(fh)\n\n    ch = logging.StreamHandler(stream=sys.stdout)\n    ch.setLevel(console_level)\n    ch.setFormatter(fmt)\n    logger.addHandler(ch)\n\n    logger.info(\"logging initialized — stage=%s file=%s\", stage, log_file)\n    return logger, log_file\n\n\ndef log_system_info(logger: logging.Logger, device) -> None:\n    \"\"\"Dump the host/torch/GPU environment — invaluable when reading old logs.\"\"\"\n    import torch\n\n    logger.info(\"=== system ===\")\n    logger.info(\"python      : %s\", sys.version.split()[0])\n    logger.info(\"platform    : %s\", platform.platform())\n    logger.info(\"torch       : %s\", torch.__version__)\n    logger.info(\"cuda avail  : %s\", torch.cuda.is_available())\n    logger.info(\"device      : %s\", device)\n    if getattr(device, \"type\", None) == \"cuda\":\n        idx = device.index or 0\n        props = torch.cuda.get_device_properties(idx)\n        logger.info(\"gpu         : %s\", props.name)\n        logger.info(\"gpu memory  : %.1f GB total\", props.total_memory / 1e9)\n        logger.info(\"gpu cc      : %d.%d\", props.major, props.minor)\n        logger.info(\"cudnn       : %s\", torch.backends.cudnn.version())\n\n\ndef gpu_mem_str(device) -> str:\n    \"\"\"Compact 'alloc/reserved/peak GB' string for periodic memory logging.\"\"\"\n    import torch\n\n    if getattr(device, \"type\", None) != \"cuda\":\n        return \"cpu (no gpu mem)\"\n    a = torch.cuda.memory_allocated() / 1e9\n    r = torch.cuda.memory_reserved() / 1e9\n    p = torch.cuda.max_memory_allocated() / 1e9\n    return f\"alloc={a:.2f}GB reserved={r:.2f}GB peak={p:.2f}GB\"\n\n\ndef log_config(logger: logging.Logger, title: str, cfg) -> None:\n    \"\"\"Pretty-print a dataclass/dict config field-by-field at INFO.\"\"\"\n    logger.info(\"=== %s ===\", title)\n    items = cfg.items() if isinstance(cfg, dict) else vars(cfg).items()\n    for k, v in items:\n        logger.info(\"  %-20s %s\", k, v)\n", "signature": ""}, {"id": "logging_utils:setup_logging", "label": "setup_logging", "kind": "function", "module": "logging_utils", "source": "def setup_logging(\n    stage: str,\n    log_dir: Path,\n    level: int = logging.DEBUG,\n    console_level: int = logging.INFO,\n) -> tuple[logging.Logger, Path]:\n    \"\"\"Configure console + file logging and return (logger, log_file_path).\n\n    `level` is the floor for the file (keep it DEBUG to capture everything);\n    `console_level` is the floor for stdout (INFO keeps the live view readable\n    while the file still gets DEBUG).\n    \"\"\"\n    log_dir.mkdir(parents=True, exist_ok=True)\n    ts = datetime.now().strftime(\"%Y%m%d_%H%M%S\")\n    log_file = log_dir / f\"{stage}_{ts}.log\"\n\n    logger = logging.getLogger(ROOT_LOGGER)\n    logger.setLevel(min(level, console_level))\n    logger.handlers.clear()  # idempotent across re-runs in the same process\n    logger.propagate = False\n\n    fmt = logging.Formatter(_FMT, datefmt=_DATEFMT)\n\n    fh = logging.FileHandler(log_file, mode=\"w\", encoding=\"utf-8\")\n    fh.setLevel(level)\n    fh.setFormatter(fmt)\n    logger.addHandler(fh)\n\n    ch = logging.StreamHandler(stream=sys.stdout)\n    ch.setLevel(console_level)\n    ch.setFormatter(fmt)\n    logger.addHandler(ch)\n\n    logger.info(\"logging initialized — stage=%s file=%s\", stage, log_file)\n    return logger, log_file", "signature": ""}, {"id": "logging_utils:log_system_info", "label": "log_system_info", "kind": "function", "module": "logging_utils", "source": "def log_system_info(logger: logging.Logger, device) -> None:\n    \"\"\"Dump the host/torch/GPU environment — invaluable when reading old logs.\"\"\"\n    import torch\n\n    logger.info(\"=== system ===\")\n    logger.info(\"python      : %s\", sys.version.split()[0])\n    logger.info(\"platform    : %s\", platform.platform())\n    logger.info(\"torch       : %s\", torch.__version__)\n    logger.info(\"cuda avail  : %s\", torch.cuda.is_available())\n    logger.info(\"device      : %s\", device)\n    if getattr(device, \"type\", None) == \"cuda\":\n        idx = device.index or 0\n        props = torch.cuda.get_device_properties(idx)\n        logger.info(\"gpu         : %s\", props.name)\n        logger.info(\"gpu memory  : %.1f GB total\", props.total_memory / 1e9)\n        logger.info(\"gpu cc      : %d.%d\", props.major, props.minor)\n        logger.info(\"cudnn       : %s\", torch.backends.cudnn.version())", "signature": ""}, {"id": "logging_utils:gpu_mem_str", "label": "gpu_mem_str", "kind": "function", "module": "logging_utils", "source": "def gpu_mem_str(device) -> str:\n    \"\"\"Compact 'alloc/reserved/peak GB' string for periodic memory logging.\"\"\"\n    import torch\n\n    if getattr(device, \"type\", None) != \"cuda\":\n        return \"cpu (no gpu mem)\"\n    a = torch.cuda.memory_allocated() / 1e9\n    r = torch.cuda.memory_reserved() / 1e9\n    p = torch.cuda.max_memory_allocated() / 1e9\n    return f\"alloc={a:.2f}GB reserved={r:.2f}GB peak={p:.2f}GB\"", "signature": ""}, {"id": "logging_utils:log_config", "label": "log_config", "kind": "function", "module": "logging_utils", "source": "def log_config(logger: logging.Logger, title: str, cfg) -> None:\n    \"\"\"Pretty-print a dataclass/dict config field-by-field at INFO.\"\"\"\n    logger.info(\"=== %s ===\", title)\n    items = cfg.items() if isinstance(cfg, dict) else vars(cfg).items()\n    for k, v in items:\n        logger.info(\"  %-20s %s\", k, v)", "signature": ""}, {"id": "mod:pretrain", "label": "pretrain.py", "kind": "module", "module": "pretrain", "source": "\"\"\"Stage 1 — PRETRAIN entrypoint.\n\nLong run on the fixed PRETRAIN_MIX (Llama-3-style multi-source) with a cosine\nLR schedule and warmup. Produces `checkpoints/qwen3_v2_pretrain_final.pt`,\nwhich `anneal.py --init-from` then consumes.\n\nRun it:\n\n  python pretrain.py                       # defaults (20k steps, wandb on)\n  python pretrain.py --max-steps 5000 --no-wandb\n  python pretrain.py --resume ../checkpoints/qwen3_v2_pretrain_step005000.pt\n\nThe annealing stage lives in `anneal.py`; the shared training loop is in\n`training.py`. This module owns only the pretrain-specific config.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport argparse\nimport logging\nimport os\nimport sys\nfrom pathlib import Path\n\nHERE = Path(__file__).resolve().parent\nsys.path.insert(0, str(HERE))\n\nfrom data import PRETRAIN_MIX            # noqa: E402\nfrom training import StageConfig         # noqa: E402\n\nV2_DIR = HERE.parent\n\n\ndef default_pretrain_config(context_length: int) -> StageConfig:\n    \"\"\"Cosine schedule, warmup, fixed pretrain mix.\n\n    v3 target: 50k steps x 524K tokens/step ≈ 26B tokens (provisional — finalize\n    after the first tok/s calibration). The ~22h/day schedule makes this budget\n    reachable in a few weeks. `warmup_steps` raised to 2k for the larger model.\n    \"\"\"\n    return StageConfig(\n        name=\"pretrain\", mix=PRETRAIN_MIX,\n        max_steps=50_000, lr_peak=3e-4, lr_end=3e-5,\n        warmup_steps=2_000, schedule=\"cosine\",\n        context_length=context_length,\n    )\n\n\ndef parse_args() -> argparse.Namespace:\n    p = argparse.ArgumentParser(description=\"v3 stage-1 pretrain\")\n    p.add_argument(\"--model\", choices=[\"0.6b\", \"1.5b\", \"1.7b\"], default=\"1.5b\")\n    p.add_argument(\"--ckpt-dir\", type=Path, default=V2_DIR / \"checkpoints\")\n    p.add_argument(\"--log-dir\",  type=Path, default=V2_DIR / \"logs\")\n    p.add_argument(\"--resume\", type=Path, default=None,\n                   help=\"continue pretrain from this checkpoint (model+optimizer+counters)\")\n    # Overrides (None -> stage default).\n    p.add_argument(\"--max-steps\",  type=int, default=None)\n    p.add_argument(\"--batch-size\", type=int, default=None)\n    p.add_argument(\"--grad-accum\", type=int, default=None)\n    p.add_argument(\"--lr-peak\",    type=float, default=None)\n    p.add_argument(\"--eval-every\", type=int, default=None)\n    p.add_argument(\"--ckpt-every\", type=int, default=None)\n    p.add_argument(\"--no-wandb\",   action=\"store_true\")\n    p.add_argument(\"--wandb-project\", default=\"llm-training-v2\")\n    p.add_argument(\"--wandb-name\",    default=None)\n    p.add_argument(\"--seed\", type=int, default=123)\n    return p.parse_args()\n\n\ndef main():\n    args = parse_args()\n\n    from logging_utils import setup_logging, log_system_info\n    logger, log_file = setup_logging(\"pretrain\", args.log_dir)\n    logger.info(\"=== PRETRAIN invocation: %s\", \" \".join(sys.argv))\n\n    from bootstrap import setup_torch, build_model, init_wandb\n    from training import train_stage\n\n    device = setup_torch(args.seed)\n    log_system_info(logger, device)\n    model, model_cfg = build_model(args.model, device)\n\n    cfg = default_pretrain_config(context_length=model_cfg[\"context_length\"])\n    for k in (\"max_steps\", \"batch_size\", \"grad_accum\", \"lr_peak\", \"eval_every\", \"ckpt_every\"):\n        v = getattr(args, k)\n        if v is not None:\n            logger.info(\"override %s: %s -> %s\", k, getattr(cfg, k), v)\n            setattr(cfg, k, v)\n\n    wandb_run = init_wandb(\n        enabled=not args.no_wandb,\n        project=args.wandb_project,\n        name=args.wandb_name or f\"qwen3_{args.model}_pretrain\",\n        model_cfg=model_cfg, stage=\"pretrain\", stage_cfg=cfg,\n        extra={\"resume\": str(args.resume) if args.resume else None},\n    )\n\n    try:\n        summary = train_stage(\n            model=model, cfg=cfg, device=device,\n            ckpt_dir=args.ckpt_dir, wandb_run=wandb_run,\n            resume_from=args.resume,\n        )\n    finally:\n        if wandb_run is not None:\n            wandb_run.finish()\n\n    logger.info(\"pretrain summary: %s\", summary)\n    logger.info(\"log written to %s\", log_file)\n    logger.info(\"next: python anneal.py --init-from %s\",\n                args.ckpt_dir / \"qwen3_v2_pretrain_final.pt\")\n\n    # The HF streaming dataloader leaves background download threads alive\n    # (aiohttp + hf_xet's Rust runtime — the cas-bridge.xethub.hf.co fetches).\n    # They aren't joined at shutdown, so normal interpreter finalization tears\n    # their thread-state out and prints a cosmetic\n    # `Fatal Python error: PyGILState_Release` *after* the run is fully done.\n    # Everything we care about is already durable by here (final checkpoint on\n    # disk, wandb.finish() ran in the finally above, log handlers flushed next),\n    # so exit hard to skip the crash-prone finalization. Only reached on success;\n    # an exception still unwinds normally and prints its traceback.\n    logging.shutdown()\n    os._exit(0)\n\n\nif __name__ == \"__main__\":\n    main()\n", "signature": ""}, {"id": "pretrain:default_pretrain_config", "label": "default_pretrain_config", "kind": "function", "module": "pretrain", "source": "def default_pretrain_config(context_length: int) -> StageConfig:\n    \"\"\"Cosine schedule, warmup, fixed pretrain mix.\n\n    v3 target: 50k steps x 524K tokens/step ≈ 26B tokens (provisional — finalize\n    after the first tok/s calibration). The ~22h/day schedule makes this budget\n    reachable in a few weeks. `warmup_steps` raised to 2k for the larger model.\n    \"\"\"\n    return StageConfig(\n        name=\"pretrain\", mix=PRETRAIN_MIX,\n        max_steps=50_000, lr_peak=3e-4, lr_end=3e-5,\n        warmup_steps=2_000, schedule=\"cosine\",\n        context_length=context_length,\n    )", "signature": ""}, {"id": "pretrain:parse_args", "label": "parse_args", "kind": "function", "module": "pretrain", "source": "def parse_args() -> argparse.Namespace:\n    p = argparse.ArgumentParser(description=\"v3 stage-1 pretrain\")\n    p.add_argument(\"--model\", choices=[\"0.6b\", \"1.5b\", \"1.7b\"], default=\"1.5b\")\n    p.add_argument(\"--ckpt-dir\", type=Path, default=V2_DIR / \"checkpoints\")\n    p.add_argument(\"--log-dir\",  type=Path, default=V2_DIR / \"logs\")\n    p.add_argument(\"--resume\", type=Path, default=None,\n                   help=\"continue pretrain from this checkpoint (model+optimizer+counters)\")\n    # Overrides (None -> stage default).\n    p.add_argument(\"--max-steps\",  type=int, default=None)\n    p.add_argument(\"--batch-size\", type=int, default=None)\n    p.add_argument(\"--grad-accum\", type=int, default=None)\n    p.add_argument(\"--lr-peak\",    type=float, default=None)\n    p.add_argument(\"--eval-every\", type=int, default=None)\n    p.add_argument(\"--ckpt-every\", type=int, default=None)\n    p.add_argument(\"--no-wandb\",   action=\"store_true\")\n    p.add_argument(\"--wandb-project\", default=\"llm-training-v2\")\n    p.add_argument(\"--wandb-name\",    default=None)\n    p.add_argument(\"--seed\", type=int, default=123)\n    return p.parse_args()", "signature": ""}, {"id": "pretrain:main", "label": "main", "kind": "function", "module": "pretrain", "source": "def main():\n    args = parse_args()\n\n    from logging_utils import setup_logging, log_system_info\n    logger, log_file = setup_logging(\"pretrain\", args.log_dir)\n    logger.info(\"=== PRETRAIN invocation: %s\", \" \".join(sys.argv))\n\n    from bootstrap import setup_torch, build_model, init_wandb\n    from training import train_stage\n\n    device = setup_torch(args.seed)\n    log_system_info(logger, device)\n    model, model_cfg = build_model(args.model, device)\n\n    cfg = default_pretrain_config(context_length=model_cfg[\"context_length\"])\n    for k in (\"max_steps\", \"batch_size\", \"grad_accum\", \"lr_peak\", \"eval_every\", \"ckpt_every\"):\n        v = getattr(args, k)\n        if v is not None:\n            logger.info(\"override %s: %s -> %s\", k, getattr(cfg, k), v)\n            setattr(cfg, k, v)\n\n    wandb_run = init_wandb(\n        enabled=not args.no_wandb,\n        project=args.wandb_project,\n        name=args.wandb_name or f\"qwen3_{args.model}_pretrain\",\n        model_cfg=model_cfg, stage=\"pretrain\", stage_cfg=cfg,\n        extra={\"resume\": str(args.resume) if args.resume else None},\n    )\n\n    try:\n        summary = train_stage(\n            model=model, cfg=cfg, device=device,\n            ckpt_dir=args.ckpt_dir, wandb_run=wandb_run,\n            resume_from=args.resume,\n        )\n    finally:\n        if wandb_run is not None:\n            wandb_run.finish()\n\n    logger.info(\"pretrain summary: %s\", summary)\n    logger.info(\"log written to %s\", log_file)\n    logger.info(\"next: python anneal.py --init-from %s\",\n                args.ckpt_dir / \"qwen3_v2_pretrain_final.pt\")\n\n    # The HF streaming dataloader leaves background download threads alive\n    # (aiohttp + hf_xet's Rust runtime — the cas-bridge.xethub.hf.co fetches).\n    # They aren't joined at shutdown, so normal interpreter finalization tears\n    # their thread-state out and prints a cosmetic\n    # `Fatal Python error: PyGILState_Release` *after* the run is fully done.\n    # Everything we care about is already durable by here (final checkpoint on\n    # disk, wandb.finish() ran in the finally above, log handlers flushed next),\n    # so exit hard to skip the crash-prone finalization. Only reached on success;\n    # an exception still unwinds normally and prints its traceback.\n    logging.shutdown()\n    os._exit(0)", "signature": ""}, {"id": "mod:qwen3_model", "label": "qwen3_model.py", "kind": "module", "module": "qwen3_model", "source": "\"\"\"Qwen3-style decoder-only transformer.\n\nArchitecture:\n- RMSNorm (pre-norm)\n- Rotary positional embeddings (RoPE) with theta=1e6\n- Grouped Query Attention (GQA) with QK-norm\n- SwiGLU FFN\n- Tied input/output embeddings\n\nTwo configs are exposed: QWEN3_CONFIG_0_6B (~596M params) is the default for\nfrom-scratch training on a 24 GB GPU. QWEN3_CONFIG_1_7B is provided for the\nscale-up after the v2 pipeline is validated.\n\nThe context_length here is the *training* context, not Qwen3's native 40 960.\nWe train shorter to keep step cost down; RoPE supports extension later.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\n\n\nQWEN3_CONFIG_0_6B = {\n    \"vocab_size\":      151_936,\n    \"context_length\":   2_048,   # training context; native is 40 960\n    \"emb_dim\":          1_024,\n    \"n_layers\":            28,\n    \"n_heads\":             16,\n    \"n_kv_groups\":          8,   # GQA: 2 Q heads share each KV head\n    \"head_dim\":           128,\n    \"hidden_dim\":       3_072,\n    \"rope_base\":    1_000_000.0,\n    \"qk_norm\":           True,\n    \"rms_eps\":           1e-6,\n    \"dtype\":      torch.bfloat16,\n}\n\nQWEN3_CONFIG_1_5B = {\n    \"vocab_size\":      151_936,\n    \"context_length\":   2_048,   # training context; native is 40 960\n    \"emb_dim\":          1_792,\n    \"n_layers\":            28,\n    \"n_heads\":             16,\n    \"n_kv_groups\":          8,   # GQA: 2 Q heads share each KV head\n    \"head_dim\":           128,\n    \"hidden_dim\":       6_144,\n    \"rope_base\":    1_000_000.0,\n    \"qk_norm\":           True,\n    \"rms_eps\":           1e-6,\n    \"dtype\":      torch.bfloat16,\n}\n\nQWEN3_CONFIG_1_7B = {\n    \"vocab_size\":      151_936,\n    \"context_length\":   2_048,\n    \"emb_dim\":          2_048,\n    \"n_layers\":            28,\n    \"n_heads\":             16,\n    \"n_kv_groups\":          8,\n    \"head_dim\":           128,\n    \"hidden_dim\":       6_144,\n    \"rope_base\":    1_000_000.0,\n    \"qk_norm\":           True,\n    \"rms_eps\":           1e-6,\n    \"dtype\":      torch.bfloat16,\n}\n\n\nclass RMSNorm(nn.Module):\n    def __init__(self, dim: int, eps: float = 1e-6):\n        super().__init__()\n        self.eps = eps\n        self.scale = nn.Parameter(torch.ones(dim))\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        in_dtype = x.dtype\n        x_f32 = x.float()\n        var = x_f32.pow(2).mean(dim=-1, keepdim=True)\n        x_norm = x_f32 * torch.rsqrt(var + self.eps)\n        return (x_norm * self.scale).to(in_dtype)\n\n\ndef precompute_rope_cache(head_dim: int, context_length: int, base: float, device=None):\n    \"\"\"Return (cos, sin) tables of shape [context_length, head_dim].\"\"\"\n    inv_freq = 1.0 / (base ** (torch.arange(0, head_dim, 2, dtype=torch.float32, device=device) / head_dim))\n    positions = torch.arange(context_length, dtype=torch.float32, device=device)\n    freqs = torch.outer(positions, inv_freq)            # [T, head_dim/2]\n    emb = torch.cat((freqs, freqs), dim=-1)             # [T, head_dim]\n    return emb.cos(), emb.sin()\n\n\ndef apply_rope(x: torch.Tensor, cos: torch.Tensor, sin: torch.Tensor) -> torch.Tensor:\n    \"\"\"x: [B, n_heads, T, head_dim]. cos/sin: [T, head_dim].\"\"\"\n    half = x.shape[-1] // 2\n    x1, x2 = x[..., :half], x[..., half:]\n    rot = torch.cat((-x2, x1), dim=-1)\n    cos = cos[: x.shape[-2]].unsqueeze(0).unsqueeze(0)\n    sin = sin[: x.shape[-2]].unsqueeze(0).unsqueeze(0)\n    return (x * cos) + (rot * sin)\n\n\nclass GroupedQueryAttention(nn.Module):\n    def __init__(self, cfg: dict):\n        super().__init__()\n        self.n_heads      = cfg[\"n_heads\"]\n        self.n_kv_groups  = cfg[\"n_kv_groups\"]\n        self.head_dim     = cfg[\"head_dim\"]\n        self.group_size   = self.n_heads // self.n_kv_groups\n        assert self.n_heads % self.n_kv_groups == 0\n\n        emb_dim = cfg[\"emb_dim\"]\n        q_dim   = self.n_heads     * self.head_dim\n        kv_dim  = self.n_kv_groups * self.head_dim\n\n        self.q_proj = nn.Linear(emb_dim, q_dim,  bias=False)\n        self.k_proj = nn.Linear(emb_dim, kv_dim, bias=False)\n        self.v_proj = nn.Linear(emb_dim, kv_dim, bias=False)\n        self.o_proj = nn.Linear(q_dim,   emb_dim, bias=False)\n\n        if cfg[\"qk_norm\"]:\n            self.q_norm = RMSNorm(self.head_dim, eps=cfg[\"rms_eps\"])\n            self.k_norm = RMSNorm(self.head_dim, eps=cfg[\"rms_eps\"])\n        else:\n            self.q_norm = None\n            self.k_norm = None\n\n    def forward(self, x: torch.Tensor, cos: torch.Tensor, sin: torch.Tensor) -> torch.Tensor:\n        B, T, _ = x.shape\n\n        q = self.q_proj(x).view(B, T, self.n_heads,     self.head_dim).transpose(1, 2)\n        k = self.k_proj(x).view(B, T, self.n_kv_groups, self.head_dim).transpose(1, 2)\n        v = self.v_proj(x).view(B, T, self.n_kv_groups, self.head_dim).transpose(1, 2)\n\n        if self.q_norm is not None:\n            q = self.q_norm(q)\n            k = self.k_norm(k)\n\n        q = apply_rope(q, cos, sin)\n        k = apply_rope(k, cos, sin)\n\n        # Repeat KV heads to match Q heads (GQA expansion).\n        k = k.repeat_interleave(self.group_size, dim=1)\n        v = v.repeat_interleave(self.group_size, dim=1)\n\n        # Flash-friendly path: PyTorch picks the best backend.\n        out = F.scaled_dot_product_attention(q, k, v, is_causal=True)\n        out = out.transpose(1, 2).contiguous().view(B, T, self.n_heads * self.head_dim)\n        return self.o_proj(out)\n\n\nclass SwiGLU(nn.Module):\n    def __init__(self, cfg: dict):\n        super().__init__()\n        emb_dim    = cfg[\"emb_dim\"]\n        hidden_dim = cfg[\"hidden_dim\"]\n        self.gate_proj = nn.Linear(emb_dim, hidden_dim, bias=False)\n        self.up_proj   = nn.Linear(emb_dim, hidden_dim, bias=False)\n        self.down_proj = nn.Linear(hidden_dim, emb_dim, bias=False)\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        return self.down_proj(F.silu(self.gate_proj(x)) * self.up_proj(x))\n\n\nclass TransformerBlock(nn.Module):\n    def __init__(self, cfg: dict):\n        super().__init__()\n        self.attn_norm = RMSNorm(cfg[\"emb_dim\"], eps=cfg[\"rms_eps\"])\n        self.attn      = GroupedQueryAttention(cfg)\n        self.ffn_norm  = RMSNorm(cfg[\"emb_dim\"], eps=cfg[\"rms_eps\"])\n        self.ffn       = SwiGLU(cfg)\n\n    def forward(self, x: torch.Tensor, cos: torch.Tensor, sin: torch.Tensor) -> torch.Tensor:\n        x = x + self.attn(self.attn_norm(x), cos, sin)\n        x = x + self.ffn(self.ffn_norm(x))\n        return x\n\n\nclass Qwen3Model(nn.Module):\n    def __init__(self, cfg: dict):\n        super().__init__()\n        self.cfg = cfg\n        self.tok_emb = nn.Embedding(cfg[\"vocab_size\"], cfg[\"emb_dim\"])\n        self.blocks  = nn.ModuleList([TransformerBlock(cfg) for _ in range(cfg[\"n_layers\"])])\n        self.norm_f  = RMSNorm(cfg[\"emb_dim\"], eps=cfg[\"rms_eps\"])\n        self.lm_head = nn.Linear(cfg[\"emb_dim\"], cfg[\"vocab_size\"], bias=False)\n\n        # Weight tying.\n        self.lm_head.weight = self.tok_emb.weight\n\n        cos, sin = precompute_rope_cache(cfg[\"head_dim\"], cfg[\"context_length\"], cfg[\"rope_base\"])\n        self.register_buffer(\"rope_cos\", cos, persistent=False)\n        self.register_buffer(\"rope_sin\", sin, persistent=False)\n\n        self.use_grad_checkpoint = False\n        self.apply(self._init_weights)\n\n    @staticmethod\n    def _init_weights(module: nn.Module):\n        if isinstance(module, nn.Linear):\n            nn.init.normal_(module.weight, mean=0.0, std=0.02)\n            if module.bias is not None:\n                nn.init.zeros_(module.bias)\n        elif isinstance(module, nn.Embedding):\n            nn.init.normal_(module.weight, mean=0.0, std=0.02)\n\n    def enable_grad_checkpointing(self, enabled: bool = True):\n        self.use_grad_checkpoint = enabled\n\n    def forward(self, input_ids: torch.Tensor) -> torch.Tensor:\n        x = self.tok_emb(input_ids)\n        cos, sin = self.rope_cos, self.rope_sin\n        for block in self.blocks:\n            if self.use_grad_checkpoint and self.training:\n                x = torch.utils.checkpoint.checkpoint(block, x, cos, sin, use_reentrant=False)\n            else:\n                x = block(x, cos, sin)\n        x = self.norm_f(x)\n        return self.lm_head(x)\n\n    @torch.no_grad()\n    def num_parameters(self, non_embedding: bool = False) -> int:\n        n = sum(p.numel() for p in self.parameters())\n        if non_embedding:\n            n -= self.tok_emb.weight.numel()\n        return n\n", "signature": ""}, {"id": "qwen3_model:RMSNorm", "label": "RMSNorm", "kind": "class", "module": "qwen3_model", "source": "class RMSNorm(nn.Module):\n    def __init__(self, dim: int, eps: float = 1e-6):\n        super().__init__()\n        self.eps = eps\n        self.scale = nn.Parameter(torch.ones(dim))\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        in_dtype = x.dtype\n        x_f32 = x.float()\n        var = x_f32.pow(2).mean(dim=-1, keepdim=True)\n        x_norm = x_f32 * torch.rsqrt(var + self.eps)\n        return (x_norm * self.scale).to(in_dtype)", "signature": ""}, {"id": "qwen3_model:RMSNorm.__init__", "label": "RMSNorm.__init__", "kind": "method", "module": "qwen3_model", "source": "    def __init__(self, dim: int, eps: float = 1e-6):\n        super().__init__()\n        self.eps = eps\n        self.scale = nn.Parameter(torch.ones(dim))", "signature": ""}, {"id": "qwen3_model:RMSNorm.forward", "label": "RMSNorm.forward", "kind": "method", "module": "qwen3_model", "source": "    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        in_dtype = x.dtype\n        x_f32 = x.float()\n        var = x_f32.pow(2).mean(dim=-1, keepdim=True)\n        x_norm = x_f32 * torch.rsqrt(var + self.eps)\n        return (x_norm * self.scale).to(in_dtype)", "signature": ""}, {"id": "qwen3_model:precompute_rope_cache", "label": "precompute_rope_cache", "kind": "function", "module": "qwen3_model", "source": "def precompute_rope_cache(head_dim: int, context_length: int, base: float, device=None):\n    \"\"\"Return (cos, sin) tables of shape [context_length, head_dim].\"\"\"\n    inv_freq = 1.0 / (base ** (torch.arange(0, head_dim, 2, dtype=torch.float32, device=device) / head_dim))\n    positions = torch.arange(context_length, dtype=torch.float32, device=device)\n    freqs = torch.outer(positions, inv_freq)            # [T, head_dim/2]\n    emb = torch.cat((freqs, freqs), dim=-1)             # [T, head_dim]\n    return emb.cos(), emb.sin()", "signature": ""}, {"id": "qwen3_model:apply_rope", "label": "apply_rope", "kind": "function", "module": "qwen3_model", "source": "def apply_rope(x: torch.Tensor, cos: torch.Tensor, sin: torch.Tensor) -> torch.Tensor:\n    \"\"\"x: [B, n_heads, T, head_dim]. cos/sin: [T, head_dim].\"\"\"\n    half = x.shape[-1] // 2\n    x1, x2 = x[..., :half], x[..., half:]\n    rot = torch.cat((-x2, x1), dim=-1)\n    cos = cos[: x.shape[-2]].unsqueeze(0).unsqueeze(0)\n    sin = sin[: x.shape[-2]].unsqueeze(0).unsqueeze(0)\n    return (x * cos) + (rot * sin)", "signature": ""}, {"id": "qwen3_model:GroupedQueryAttention", "label": "GroupedQueryAttention", "kind": "class", "module": "qwen3_model", "source": "class GroupedQueryAttention(nn.Module):\n    def __init__(self, cfg: dict):\n        super().__init__()\n        self.n_heads      = cfg[\"n_heads\"]\n        self.n_kv_groups  = cfg[\"n_kv_groups\"]\n        self.head_dim     = cfg[\"head_dim\"]\n        self.group_size   = self.n_heads // self.n_kv_groups\n        assert self.n_heads % self.n_kv_groups == 0\n\n        emb_dim = cfg[\"emb_dim\"]\n        q_dim   = self.n_heads     * self.head_dim\n        kv_dim  = self.n_kv_groups * self.head_dim\n\n        self.q_proj = nn.Linear(emb_dim, q_dim,  bias=False)\n        self.k_proj = nn.Linear(emb_dim, kv_dim, bias=False)\n        self.v_proj = nn.Linear(emb_dim, kv_dim, bias=False)\n        self.o_proj = nn.Linear(q_dim,   emb_dim, bias=False)\n\n        if cfg[\"qk_norm\"]:\n            self.q_norm = RMSNorm(self.head_dim, eps=cfg[\"rms_eps\"])\n            self.k_norm = RMSNorm(self.head_dim, eps=cfg[\"rms_eps\"])\n        else:\n            self.q_norm = None\n            self.k_norm = None\n\n    def forward(self, x: torch.Tensor, cos: torch.Tensor, sin: torch.Tensor) -> torch.Tensor:\n        B, T, _ = x.shape\n\n        q = self.q_proj(x).view(B, T, self.n_heads,     self.head_dim).transpose(1, 2)\n        k = self.k_proj(x).view(B, T, self.n_kv_groups, self.head_dim).transpose(1, 2)\n        v = self.v_proj(x).view(B, T, self.n_kv_groups, self.head_dim).transpose(1, 2)\n\n        if self.q_norm is not None:\n            q = self.q_norm(q)\n            k = self.k_norm(k)\n\n        q = apply_rope(q, cos, sin)\n        k = apply_rope(k, cos, sin)\n\n        # Repeat KV heads to match Q heads (GQA expansion).\n        k = k.repeat_interleave(self.group_size, dim=1)\n        v = v.repeat_interleave(self.group_size, dim=1)\n\n        # Flash-friendly path: PyTorch picks the best backend.\n        out = F.scaled_dot_product_attention(q, k, v, is_causal=True)\n        out = out.transpose(1, 2).contiguous().view(B, T, self.n_heads * self.head_dim)\n        return self.o_proj(out)", "signature": ""}, {"id": "qwen3_model:GroupedQueryAttention.__init__", "label": "GroupedQueryAttention.__init__", "kind": "method", "module": "qwen3_model", "source": "    def __init__(self, cfg: dict):\n        super().__init__()\n        self.n_heads      = cfg[\"n_heads\"]\n        self.n_kv_groups  = cfg[\"n_kv_groups\"]\n        self.head_dim     = cfg[\"head_dim\"]\n        self.group_size   = self.n_heads // self.n_kv_groups\n        assert self.n_heads % self.n_kv_groups == 0\n\n        emb_dim = cfg[\"emb_dim\"]\n        q_dim   = self.n_heads     * self.head_dim\n        kv_dim  = self.n_kv_groups * self.head_dim\n\n        self.q_proj = nn.Linear(emb_dim, q_dim,  bias=False)\n        self.k_proj = nn.Linear(emb_dim, kv_dim, bias=False)\n        self.v_proj = nn.Linear(emb_dim, kv_dim, bias=False)\n        self.o_proj = nn.Linear(q_dim,   emb_dim, bias=False)\n\n        if cfg[\"qk_norm\"]:\n            self.q_norm = RMSNorm(self.head_dim, eps=cfg[\"rms_eps\"])\n            self.k_norm = RMSNorm(self.head_dim, eps=cfg[\"rms_eps\"])\n        else:\n            self.q_norm = None\n            self.k_norm = None", "signature": ""}, {"id": "qwen3_model:GroupedQueryAttention.forward", "label": "GroupedQueryAttention.forward", "kind": "method", "module": "qwen3_model", "source": "    def forward(self, x: torch.Tensor, cos: torch.Tensor, sin: torch.Tensor) -> torch.Tensor:\n        B, T, _ = x.shape\n\n        q = self.q_proj(x).view(B, T, self.n_heads,     self.head_dim).transpose(1, 2)\n        k = self.k_proj(x).view(B, T, self.n_kv_groups, self.head_dim).transpose(1, 2)\n        v = self.v_proj(x).view(B, T, self.n_kv_groups, self.head_dim).transpose(1, 2)\n\n        if self.q_norm is not None:\n            q = self.q_norm(q)\n            k = self.k_norm(k)\n\n        q = apply_rope(q, cos, sin)\n        k = apply_rope(
