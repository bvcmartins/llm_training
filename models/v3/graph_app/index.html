eps\"])\n        self.lm_head = nn.Linear(cfg[\"emb_dim\"], cfg[\"vocab_size\"], bias=False)\n\n        # Weight tying.\n        self.lm_head.weight = self.tok_emb.weight\n\n        cos, sin = precompute_rope_cache(cfg[\"head_dim\"], cfg[\"context_length\"], cfg[\"rope_base\"])\n        self.register_buffer(\"rope_cos\", cos, persistent=False)\n        self.register_buffer(\"rope_sin\", sin, persistent=False)\n\n        self.use_grad_checkpoint = False\n        self.apply(self._init_weights)", "signature": ""}, {"id": "qwen3_model:Qwen3Model._init_weights", "label": "Qwen3Model._init_weights", "kind": "method", "module": "qwen3_model", "source": "    @staticmethod\n    def _init_weights(module: nn.Module):\n        if isinstance(module, nn.Linear):\n            nn.init.normal_(module.weight, mean=0.0, std=0.02)\n            if module.bias is not None:\n                nn.init.zeros_(module.bias)\n        elif isinstance(module, nn.Embedding):\n            nn.init.normal_(module.weight, mean=0.0, std=0.02)", "signature": ""}, {"id": "qwen3_model:Qwen3Model.enable_grad_checkpointing", "label": "Qwen3Model.enable_grad_checkpointing", "kind": "method", "module": "qwen3_model", "source": "    def enable_grad_checkpointing(self, enabled: bool = True):\n        self.use_grad_checkpoint = enabled", "signature": ""}, {"id": "qwen3_model:Qwen3Model.forward", "label": "Qwen3Model.forward", "kind": "method", "module": "qwen3_model", "source": "    def forward(self, input_ids: torch.Tensor) -> torch.Tensor:\n        x = self.tok_emb(input_ids)\n        cos, sin = self.rope_cos, self.rope_sin\n        for block in self.blocks:\n            if self.use_grad_checkpoint and self.training:\n                x = torch.utils.checkpoint.checkpoint(block, x, cos, sin, use_reentrant=False)\n            else:\n                x = block(x, cos, sin)\n        x = self.norm_f(x)\n        return self.lm_head(x)", "signature": ""}, {"id": "qwen3_model:Qwen3Model.num_parameters", "label": "Qwen3Model.num_parameters", "kind": "method", "module": "qwen3_model", "source": "    @torch.no_grad()\n    def num_parameters(self, non_embedding: bool = False) -> int:\n        n = sum(p.numel() for p in self.parameters())\n        if non_embedding:\n            n -= self.tok_emb.weight.numel()\n        return n", "signature": ""}, {"id": "mod:run", "label": "run.py", "kind": "module", "module": "run", "source": "\"\"\"CLI runner for v2 staged training.\n\nExamples:\n\n  # Start pretrain from scratch\n  python run.py --stage pretrain\n\n  # Resume pretrain (continues same stage from saved step/optimizer)\n  python run.py --stage pretrain --resume ../checkpoints/qwen3_v2_pretrain_step005000.pt\n\n  # Start anneal seeded from the final pretrain checkpoint (fresh optimizer)\n  python run.py --stage anneal --init-from ../checkpoints/qwen3_v2_pretrain_final.pt\n\n  # Override defaults\n  python run.py --stage pretrain --max-steps 5000 --batch-size 2 --grad-accum 128\n\nThe handoff with the notebook is symmetric: any checkpoint produced by the\nnotebook is a valid `--resume` target here, and vice versa — both call into\nthe same `train_stage()` in training.py.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport argparse\nimport os\nimport sys\nfrom pathlib import Path\n\nHERE = Path(__file__).resolve().parent\nsys.path.insert(0, str(HERE))\n\nMODEL_CHOICES = (\"0.6b\", \"1.5b\", \"1.7b\")\n\n\ndef parse_args() -> argparse.Namespace:\n    p = argparse.ArgumentParser(description=\"v3 staged trainer\")\n    p.add_argument(\"--stage\", choices=[\"pretrain\", \"anneal\"], required=True)\n    p.add_argument(\"--model\", choices=MODEL_CHOICES, default=\"1.5b\")\n    p.add_argument(\"--ckpt-dir\", type=Path, default=HERE.parent / \"checkpoints\")\n\n    # Mutually exclusive resume modes.\n    g = p.add_mutually_exclusive_group()\n    g.add_argument(\"--resume\",    type=Path, default=None,\n                   help=\"continue SAME stage from this checkpoint (loads model+optimizer+counters)\")\n    g.add_argument(\"--init-from\", type=Path, default=None,\n                   help=\"start NEW stage seeded from this checkpoint's model weights (fresh optimizer)\")\n    g.add_argument(\"--auto-resume\", action=\"store_true\",\n                   help=\"resume from the newest qwen3_v3_<stage>_step*.pt in --ckpt-dir; \"\n                        \"start fresh if none exist (used by the scheduled-training launcher)\")\n\n    # Scheduled-training graceful stop: local 'HH:MM' wall-clock deadline at\n    # which the trainer checkpoints and exits cleanly (yields GPU for blackout).\n    p.add_argument(\"--stop-at\", type=str, default=None, metavar=\"HH:MM\")\n\n    # Overrides (None = use stage defaults).\n    p.add_argument(\"--max-steps\",  type=int, default=None)\n    p.add_argument(\"--batch-size\", type=int, default=None)\n    p.add_argument(\"--grad-accum\", type=int, default=None)\n    p.add_argument(\"--lr-peak\",    type=float, default=None)\n    p.add_argument(\"--eval-every\", type=int, default=None)\n    p.add_argument(\"--ckpt-every\", type=int, default=None)\n\n    p.add_argument(\"--no-wandb\",   action=\"store_true\")\n    p.add_argument(\"--wandb-project\", default=\"llm-training-v3\")\n    p.add_argument(\"--wandb-name\",    default=None)\n    p.add_argument(\"--seed\",       type=int, default=123)\n    return p.parse_args()\n\n\ndef resolve_auto_resume(ckpt_dir: Path, stage: str) -> Path | None:\n    \"\"\"Newest `qwen3_v3_<stage>_step*.pt` in ckpt_dir, or None for a fresh start.\n\n    `_final.pt` is intentionally ignored — a completed stage should hand off to\n    the next stage (manual `--init-from`), not silently re-resume here.\n    \"\"\"\n    cands = sorted(\n        ckpt_dir.glob(f\"qwen3_v3_{stage}_step*.pt\"),\n        key=lambda p: p.stat().st_mtime,\n    )\n    return cands[-1] if cands else None\n\n\ndef main():\n    args = parse_args()\n\n    # Heavy imports happen here so `--help` is fast and doesn't need\n    # the full training env loaded.\n    os.environ.setdefault(\"PYTORCH_CUDA_ALLOC_CONF\", \"expandable_segments:True\")\n    import torch\n    from qwen3_model import (\n        Qwen3Model, QWEN3_CONFIG_0_6B, QWEN3_CONFIG_1_5B, QWEN3_CONFIG_1_7B,\n    )\n    from training import train_stage, load_resume_state, stage_cfg_from_dict\n    # Stage-config factories were moved out of training.py (the engine) and now\n    # live with their stage entrypoints.\n    from pretrain import default_pretrain_config\n    from anneal import default_anneal_config\n\n    model_configs = {\n        \"0.6b\": QWEN3_CONFIG_0_6B, \"1.5b\": QWEN3_CONFIG_1_5B, \"1.7b\": QWEN3_CONFIG_1_7B,\n    }\n\n    # --auto-resume → resolve to a concrete --resume target (newest step ckpt for\n    # this stage), or fall through to a fresh start if none exist.\n    if args.auto_resume:\n        newest = resolve_auto_resume(args.ckpt_dir, args.stage)\n        if newest is not None:\n            args.resume = newest\n            print(f\"[auto-resume] resuming from {newest.name}\")\n        else:\n            print(f\"[auto-resume] no qwen3_v3_{args.stage}_step*.pt in {args.ckpt_dir} — fresh start\")\n\n    device = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\n    torch.manual_seed(args.seed)\n    if device.type == \"cuda\":\n        torch.cuda.manual_seed_all(args.seed)\n    torch.set_float32_matmul_precision(\"high\")\n    torch.backends.cudnn.benchmark = True\n\n    model_cfg = model_configs[args.model]\n    model = Qwen3Model(model_cfg).to(device=device, dtype=model_cfg[\"dtype\"])\n\n    def apply_overrides(cfg):\n        for k in (\"max_steps\", \"batch_size\", \"grad_accum\", \"lr_peak\", \"eval_every\", \"ckpt_every\"):\n            v = getattr(args, k)\n            if v is not None:\n                setattr(cfg, k, v)\n        return cfg\n\n    def build_stage_cfg():\n        if args.stage == \"pretrain\":\n            return default_pretrain_config(context_length=model_cfg[\"context_length\"])\n        # anneal — derive peak LR from the pretrain seed if available\n        pretrain_end_lr = 3e-5\n        if args.init_from is not None:\n            payload = torch.load(args.init_from, map_location=\"cpu\", weights_only=False)\n            saved = payload.get(\"stage_cfg\")\n            if saved is not None:\n                pretrain_end_lr = saved.get(\"lr_end\", pretrain_end_lr)\n        return default_anneal_config(\n            context_length=model_cfg[\"context_length\"],\n            pretrain_end_lr=pretrain_end_lr,\n        )\n\n    # Decide stage cfg. If --resume, use the saved cfg verbatim (continuing the\n    # same stage means the schedule must be the same). Otherwise build fresh.\n    if args.resume is not None:\n        payload = torch.load(args.resume, map_location=\"cpu\", weights_only=False)\n        saved_cfg = payload.get(\"stage_cfg\")\n        if saved_cfg is None:\n            raise SystemExit(\n                f\"--resume target {args.resume} has no stage_cfg (likely an old checkpoint). \"\n                f\"Use --init-from instead to seed a fresh stage from these weights.\"\n            )\n        if payload[\"stage\"] != args.stage:\n            raise SystemExit(\n                f\"--resume target is for stage '{payload['stage']}' but --stage={args.stage}. \"\n                f\"Either match the stage, or use --init-from to start a new stage from these weights.\"\n            )\n        stage_cfg = stage_cfg_from_dict(saved_cfg)\n    else:\n        stage_cfg = build_stage_cfg()\n\n    stage_cfg = apply_overrides(stage_cfg)\n\n    # v3 identity + scheduled-stop deadline — always taken from the live args so a\n    # resumed checkpoint's stale stop_at can't leak in, and the config_ref tracks\n    # the chosen model size.\n    stage_cfg.model_tag = \"qwen3_v3\"\n    stage_cfg.model_config_ref = f\"qwen3_model.QWEN3_CONFIG_{args.model.upper().replace('.', '_')}\"\n    stage_cfg.stop_at = args.stop_at\n\n    # If --init-from, load weights only (fresh optimizer). train_stage's\n    # resume_from path is only for same-stage resume, so do this here.\n    if args.init_from is not None:\n        load_resume_state(args.init_from, model, optimizer=None)\n        print(f\"initialized model weights from {args.init_from.name}\")\n\n    # wandb\n    wandb_run = None\n    if not args.no_wandb:\n        import wandb\n        wandb_run = wandb.init(\n            project=args.wandb_project,\n            name=args.wandb_name or f\"qwen3_{args.model}_{args.stage}\",\n            config={\n                \"model_config\": model_cfg,\n                \"stage\":        args.stage,\n                \"mix\":          stage_cfg.mix.weights,\n                \"resume\":       str(args.resume) if args.resume else None,\n                \"init_from\":    str(args.init_from) if args.init_from else None,\n                **{k: v for k, v in stage_cfg.__dict__.items() if k != \"mix\"},\n            },\n        )\n\n    print(f\"=== stage={args.stage} model={args.model} device={device} ===\")\n    print(stage_cfg)\n\n    summary = train_stage(\n        model=model,\n        cfg=stage_cfg,\n        device=device,\n        ckpt_dir=args.ckpt_dir,\n        wandb_run=wandb_run,\n        resume_from=args.resume,\n    )\n\n    if wandb_run is not None:\n        wandb_run.finish()\n\n    print(\"\\nstage summary:\")\n    for k, v in summary.items():\n        print(f\"  {k}: {v}\")\n\n    # The HF streaming dataloader leaves background download threads alive\n    # (aiohttp + hf_xet's Rust runtime). They aren't joined at shutdown, so\n    # normal interpreter finalization tears their thread-state out and prints a\n    # cosmetic `Fatal Python error: PyGILState_Release` *after* the run is fully\n    # done — which also makes the process exit non-zero. Everything we care about\n    # is already durable here (checkpoint on disk, wandb.finish() ran above), so\n    # exit hard to skip the crash-prone finalization and return a clean 0. Only\n    # reached on success; an exception still unwinds normally with its traceback.\n    sys.stdout.flush()\n    sys.stderr.flush()\n    os._exit(0)\n\n\nif __name__ == \"__main__\":\n    main()\n", "signature": ""}, {"id": "run:parse_args", "label": "parse_args", "kind": "function", "module": "run", "source": "def parse_args() -> argparse.Namespace:\n    p = argparse.ArgumentParser(description=\"v3 staged trainer\")\n    p.add_argument(\"--stage\", choices=[\"pretrain\", \"anneal\"], required=True)\n    p.add_argument(\"--model\", choices=MODEL_CHOICES, default=\"1.5b\")\n    p.add_argument(\"--ckpt-dir\", type=Path, default=HERE.parent / \"checkpoints\")\n\n    # Mutually exclusive resume modes.\n    g = p.add_mutually_exclusive_group()\n    g.add_argument(\"--resume\",    type=Path, default=None,\n                   help=\"continue SAME stage from this checkpoint (loads model+optimizer+counters)\")\n    g.add_argument(\"--init-from\", type=Path, default=None,\n                   help=\"start NEW stage seeded from this checkpoint's model weights (fresh optimizer)\")\n    g.add_argument(\"--auto-resume\", action=\"store_true\",\n                   help=\"resume from the newest qwen3_v3_<stage>_step*.pt in --ckpt-dir; \"\n                        \"start fresh if none exist (used by the scheduled-training launcher)\")\n\n    # Scheduled-training graceful stop: local 'HH:MM' wall-clock deadline at\n    # which the trainer checkpoints and exits cleanly (yields GPU for blackout).\n    p.add_argument(\"--stop-at\", type=str, default=None, metavar=\"HH:MM\")\n\n    # Overrides (None = use stage defaults).\n    p.add_argument(\"--max-steps\",  type=int, default=None)\n    p.add_argument(\"--batch-size\", type=int, default=None)\n    p.add_argument(\"--grad-accum\", type=int, default=None)\n    p.add_argument(\"--lr-peak\",    type=float, default=None)\n    p.add_argument(\"--eval-every\", type=int, default=None)\n    p.add_argument(\"--ckpt-every\", type=int, default=Non ge_cfg\")\n        if saved_cfg is None:\n            raise SystemExit(\n                f\"--resume target {args.resume} has no stage_cfg (likely an old checkpoint). \"\n                f\"Use --init-from instead to seed a fresh stage from these weights.\"\n            )\n        if payload[\"stage\"] != args.stage:\n            raise SystemExit(\n                f\"--resume target is for stage '{payload['stage']}' but --stage={args.stage}. \"\n                f\"Either match the stage, or use --init-from to start a new stage from these weights.\"\n            )\n        stage_cfg = stage_cfg_from_dict(saved_cfg)\n    else:\n        stage_cfg = build_stage_cfg()\n\n    stage_cfg = apply_overrides(stage_cfg)\n\n    # v3 identity + scheduled-stop deadline — always taken from the live args so a\n    # resumed checkpoint's stale stop_at can't leak in, and the config_ref tracks\n    # the chosen model size.\n    stage_cfg.model_tag = \"qwen3_v3\"\n    stage_cfg.model_config_ref = f\"qwen3_model.QWEN3_CONFIG_{args.model.upper().replace('.', '_')}\"\n    stage_cfg.stop_at = args.stop_at\n\n    # If --init-from, load weights only (fresh optimizer). train_stage's\n    # resume_from path is only for same-stage resume, so do this here.\n    if args.init_from is not None:\n        load_resume_state(args.init_from, model, optimizer=None)\n        print(f\"initialized model weights from {args.init_from.name}\")\n\n    # wandb\n    wandb_run = None\n    if not args.no_wandb:\n        import wandb\n        wandb_run = wandb.init(\n            project=args.wandb_project,\n            name=args.wandb_name or f\"qwen3_{args.model}_{args.stage}\",\n            config={\n                \"model_config\": model_cfg,\n                \"stage\":        args.stage,\n                \"mix\":          stage_cfg.mix.weights,\n                \"resume\":       str(args.resume) if args.resume else None,\n                \"init_from\":    str(args.init_from) if args.init_from else None,\n _REPO) -> Tokenizer:\n    path = hf_hub_download(repo_id=repo_id, filename=\"tokenizer.json\")\n    return Tokenizer.from_file(str(path))\n\n\ndef eot_id(repo_id: str = DEFAULT_REPO) -> int:\n    tok = get_tokenizer(repo_id)\n    return tok.token_to_id(EOT_TOKEN)\n\n\ndef encode(text: str, repo_id: str = DEFAULT_REPO) -> list[int]:\n    return get_tokenizer(repo_id).encode(text).ids\n\n\ndef decode(ids: list[int], repo_id: str = DEFAULT_REPO) -> str:\n    return get_tokenizer(repo_id).decode(ids)\n", "signature": ""}, {"id": "tokenizer:get_tokenizer", "label": "get_tokenizer", "kind": "function", "module": "tokenizer", "source": "@lru_cache(maxsize=4)\ndef get_tokenizer(repo_id: str = DEFAULT_REPO) -> Tokenizer:\n    path = hf_hub_download(repo_id=repo_id, filename=\"tokenizer.json\")\n    return Tokenizer.from_file(str(path))", "signature": ""}, {"id": "tokenizer:eot_id", "label": "eot_id", "kind": "function", "module": "tokenizer", "source": "def eot_id(repo_id: str = DEFAULT_REPO) -> int:\n    tok = get_tokenizer(repo_id)\n    return tok.token_to_id(EOT_TOKEN)", "signature": ""}, {"id": "tokenizer:encode", "label": "encode", "kind": "function", "module": "tokenizer", "source": "def encode(text: str, repo_id: str = DEFAULT_REPO) -> list[int]:\n    return get_tokenizer(repo_id).encode(text).ids", "signature": ""}, {"id": "tokenizer:decode", "label": "decode", "kind": "function", "module": "tokenizer", "source": "def decode(ids: list[int], repo_id: str = DEFAULT_REPO) -> str:\n    return get_tokenizer(repo_id).decode(ids)", "signature": ""}, {"id": "mod:training", "label": "training.py", "kind": "module", "module": "training", "source": "\"\"\"Staged training loop for v2.\n\nTwo stages, Llama 3 style:\n  1. PRETRAIN — long run on PRETRAIN_MIX, cosine LR with warmup.\n  2. ANNEAL   — short run on ANNEAL_MIX (up-weighted math/arxiv),\n                linear LR decay from the pretrain end-LR to 0.\n\nThe same `train_stage(...)` function runs both — the stage is just a config.\nEvery wandb log line and every checkpoint carries the stage name so the\ntraining-data identity of any model state is unambiguous.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport logging\nimport math\nimport signal\nimport time\nfrom datetime import datetime, timedelta\nfrom dataclasses import asdict, dataclass, field\nfrom pathlib import Path\n\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nimport wandb\n\nfrom data import (\n    StageMix, PRETRAIN_MIX, ANNEAL_MIX,\n    SOURCE_IDS, ID_TO_SOURCE,\n    build_train_loader, build_val_loaders,\n)\nfrom eval import evaluate_per_domain, PlateauDetector\nfrom logging_utils import gpu_mem_str, log_config\nfrom tokenizer import encode, decode, eot_id\n\n# Shared engine logger. Entrypoints (pretrain.py / anneal.py) attach the\n# handlers via logging_utils.setup_logging(); if nobody configured logging we\n# still emit to stdout rather than silently dropping records.\nlog = logging.getLogger(\"v2.train\")\nif not logging.getLogger(\"v2\").handlers:\n    logging.basicConfig(level=logging.INFO, format=\"%(asctime)s | %(levelname)-7s | %(name)-12s | %(message)s\")\n\n\ndef _safe_ppl(loss: float) -> float:\n    return math.exp(min(loss, 30.0))\n\n\ndef _next_deadline(stop_at: str | None, now: datetime | None = None) -> datetime | None:\n    \"\"\"Return the next local datetime matching 'HH:MM' (today if still ahead,\n    else tomorrow). None when no deadline is configured.\n\n    Used by scheduled training so a session started at 22:00 stops by ~19:55\n    the next day, yielding the GPU during the user's 8-10pm blackout.\n    \"\"\"\n    if not stop_at:\n        return None\n    now = now or datetime.now()\n    hh, mm = (int(x) for x in stop_at.split(\":\"))\n    target = now.replace(hour=hh, minute=mm, second=0, microsecond=0)\n    if target <= now:\n        target += timedelta(days=1)\n    return target\n\n\ndef _fmt_dur(seconds: float) -> str:\n    \"\"\"Human-readable h/m/s, e.g. 3723s -> '1h02m03s'.\"\"\"\n    seconds = int(max(seconds, 0))\n    h, rem = divmod(seconds, 3600)\n    m, s = divmod(rem, 60)\n    if h:\n        return f\"{h}h{m:02d}m{s:02d}s\"\n    if m:\n        return f\"{m}m{s:02d}s\"\n    return f\"{s}s\"\n\n\n# ---------------------------------------------------------------------------\n# Config\n# ---------------------------------------------------------------------------\n\n@dataclass\nclass StageConfig:\n    name:            str           # \"pretrain\" | \"anneal\"\n    mix:             StageMix\n    max_steps:       int\n    batch_size:      int     = 2     # v3: 1.5B fits ~21.5GB at bs=2/ctx=2048 (bs=1 fallback if OOM)\n    grad_accum:      int     = 128   # bs2 x ctx2048 x accum128 = 524K tokens/opt-step (== v2 budget)\n    context_length:  int     = 2_048\n    lr_peak:         float   = 3e-4\n    lr_end:          float   = 3e-5\n    warmup_steps:    int     = 1_000\n    schedule:        str     = \"cosine\"   # \"cosine\" (pretrain) or \"linear\" (anneal)\n    weight_decay:    float   = 0.1\n    grad_clip:       float   = 1.0\n    eval_every:      int     = 250\n    eval_batches:    int     = 20\n    ckpt_every:      int     = 500   # v3: 1.5B does far fewer steps/day than v2, so checkpoint more often for crash recovery (prune keeps disk bounded)\n    val_docs_per_source: int = 200\n    grad_checkpoint: bool    = True\n    sample_every:    int     = 500\n    sample_prompt:   str     = \"The quick brown fox\"\n    sample_max_new:  int     = 60\n    sample_top_k:    int     = 50\n    sample_temperature: float = 0.8\n    # v3 additions ----------------------------------------------------------\n    # Checkpoint identity (was hardcoded to v2/0.6B in the engine).\n    model_tag:        str    = \"qwen3_v3\"\n    model_config_ref: str    = \"qwen3_model.QWEN3_CONFIG_1_5B\"\n    # Scheduled-training graceful stop: wall-clock \"HH:MM\" local deadline at\n    # which the loop checkpoints and exits cleanly (None = run to max_steps).\n    stop_at:          str | None = None\n\n\n# Stage-config factories now live with their stage entrypoints:\n#   default_pretrain_config -> pretrain.py\n#   default_anneal_config   -> anneal.py\n# training.py is the stage-agnostic engine; it only needs StageConfig.\n\n\n# ---------------------------------------------------------------------------\n# Optimizer + schedule\n# ---------------------------------------------------------------------------\n\ndef build_optimizer(model: nn.Module, lr: float, weight_decay: float) -> torch.optim.Optimizer:\n    \"\"\"Apply weight decay only to matrices (Linear weights), not norms/biases/embeddings.\"\"\"\n    decay, no_decay = [], []\n    for n, p in model.named_parameters():\n        if not p.requires_grad:\n            continue\n        if p.ndim < 2 or \"norm\" in n or \"bias\" in n or \"tok_emb\" in n:\n            no_decay.append(p)\n        else:\n            decay.append(p)\n    groups = [\n        {\"params\": decay,    \"weight_decay\": weight_decay},\n        {\"params\": no_decay, \"weight_decay\": 0.0},\n    ]\n    return torch.optim.AdamW(groups, lr=lr, betas=(0.9, 0.95), eps=1e-8, fused=True)\n\n\ndef lr_for_step(step: int, cfg: StageConfig) -> float:\n    if step < cfg.warmup_steps:\n        return cfg.lr_peak * (step + 1) / max(cfg.warmup_steps, 1)\n    progress = (step - cfg.warmup_steps) / max(cfg.max_steps - cfg.warmup_steps, 1)\n    progress = min(max(progress, 0.0), 1.0)\n    if cfg.schedule == \"cosine\":\n        return cfg.lr_end + 0.5 * (cfg.lr_peak - cfg.lr_end) * (1 + math.cos(math.pi * progress))\n    if cfg.schedule == \"linear\":\n        return cfg.lr_peak + (cfg.lr_end - cfg.lr_peak) * progress\n    raise ValueError(f\"unknown schedule: {cfg.schedule}\")\n\n\n# ---------------------------------------------------------------------------\n# Checkpoints (stage-aware)\n# ---------------------------------------------------------------------------\n\ndef save_checkpoint(\n    path:       Path,\n    model:      nn.Module,\n    optimizer:  torch.optim.Optimizer,\n    stage_cfg:  StageConfig,\n    step:       int,\n    tokens:     int,\n    docs_per_source: dict,\n    val_history:list,\n    stage_start_step: int = 0,\n):\n    payload = {\n        \"model\":            model.state_dict(),\n        \"optimizer\":        optimizer.state_dict(),\n        \"stage\":            stage_cfg.name,\n        \"stage_mix\":        stage_cfg.mix.weights,\n        \"stage_cfg\":        asdict(stage_cfg),\n        \"step\":             step,\n        \"stage_start_step\": stage_start_step,\n        \"tokens\":           tokens,\n        \"docs_per_source\":  docs_per_source,\n        \"val_history\":      val_history,\n        \"model_config_ref\": stage_cfg.model_config_ref,\n    }\n    tmp = path.with_suffix(\".tmp\")\n    torch.save(payload, tmp)\n    tmp.replace(path)\n\n\ndef stage_cfg_from_dict(d: dict) -> StageConfig:\n    \"\"\"Rebuild a StageConfig from the dict saved in a checkpoint.\"\"\"\n    d = dict(d)\n    mix_d = d.pop(\"mix\")\n    mix = StageMix(name=mix_d[\"name\"], weights=dict(mix_d[\"weights\"]))\n    return StageConfig(mix=mix, **d)\n\n\ndef load_resume_state(\n    path:      Path,\n    model:     nn.Module,\n    optimizer: torch.optim.Optimizer | None = None,\n) -> dict:\n    \"\"\"Load weights + (optionally) optimizer state + training counters.\n\n    Returns a dict with keys: step, tokens, docs_per_source, val_history,\n    stage, stage_cfg (raw dict). Pass `optimizer=None` to load *only* the model\n    weights (use this for --init-from to start a new stage from prior weights).\n    \"\"\"\n    payload = torch.load(path, map_location=\"cpu\", weights_only=False)\n    model.load_state_dict(payload[\"model\"])\n    if optimizer is not None:\n        optimizer.load_state_dict(payload[\"optimizer\"])\n    return {\n        \"step\":             payload[\"step\"],\n        \"stage_start_step\": payload.get(\"stage_start_step\"),\n        \"tokens\":           payload[\"tokens\"],\n        \"docs_per_source\":  payload[\"docs_per_source\"],\n        \"val_history\":      payload.get(\"val_history\", []),\n        \"stage\":            payload[\"stage\"],\n        \"stage_cfg\":        payload.get(\"stage_cfg\"),\n    }\n\n\n# ---------------------------------------------------------------------------\n# Inference sampling (qualitative progress check)\n# ---------------------------------------------------------------------------\n\n@torch.no_grad()\ndef generate(\n    model:          nn.Module,\n    idx:            torch.Tensor,        # [B, T]\n    max_new_tokens: int,\n    context_size:   int,\n    device:         torch.device,\n    temperature:    float = 0.0,\n    top_k:          int | None = None,\n    eos_id:         int | None = None,\n) -> torch.Tensor:\n    was_training = model.training\n    model.eval()\n    use_amp = device.type == \"cuda\"\n    for _ in range(max_new_tokens):\n        idx_cond = idx[:, -context_size:]\n        if use_amp:\n            with torch.autocast(device_type=device.type, dtype=torch.bfloat16):\n                logits = model(idx_cond)\n        else:\n            logits = model(idx_cond)\n        logits = logits[:, -1, :].float()\n\n        if top_k is not None:\n            top_vals, _ = torch.topk(logits, top_k, dim=-1)\n            cutoff = top_vals[:, -1:].expand_as(logits)\n            logits = torch.where(logits < cutoff, torch.full_like(logits, -float(\"inf\")), logits)\n\n        if temperature > 0.0:\n            probs = torch.softmax(logits / temperature, dim=-1)\n            idx_next = torch.multinomial(probs, num_samples=1)\n        else:\n            idx_next = torch.argmax(logits, dim=-1, keepdim=True)\n\n        if eos_id is not None and (idx_next == eos_id).all():\n            break\n\n        idx = torch.cat([idx, idx_next], dim=1)\n\n    if was_training:\n        model.train()\n    return idx\n\n\ndef generate_sample_text(\n    model:          nn.Module,\n    prompt:         str,\n    device:         torch.device,\n    context_length: int,\n    max_new_tokens: int = 60,\n    temperature:    float = 0.8,\n    top_k:          int   = 50,\n) -> str:\n    ids = encode(prompt)\n    idx = torch.tensor([ids], dtype=torch.long, device=device)\n    out = generate(\n        model, idx,\n        max_new_tokens=max_new_tokens,\n        context_size=context_length,\n        device=device,\n        temperature=temperature,\n        top_k=top_k,\n        eos_id=eot_id(),\n    )\n    return decode(out[0].cpu().tolist())\n\n\n# ---------------------------------------------------------------------------\n# One stage\n# ---------------------------------------------------------------------------\n\ndef train_stage(\n    model:           nn.Module,\n    cfg:             StageConfig,\n    device:          torch.device,\n    ckpt_dir:        Path,\n    wandb_run=None,\n    starting_step:   int                  = 0,\n    starting_tokens: int                  = 0,\n    skip_docs:       dict[str, int] | None = None,\n    resume_from:     Path | None           = None,\n) -> dict:\n    \"\"\"Run one stage. Returns final state dict-like summary for handoff.\n\n    `resume_from` continues the SAME stage from a checkpoint: model + optimizer\n    state are loaded, and step/tokens/docs counters are taken from the\n    checkpoint (overriding any starting_* / skip_docs args). The stage must\n    match the checkpoint's stage — pass a fresh `cfg` only when starting a\n    *new* stage seeded from prior weights (use `load_resume_state(...,\n    optimizer=None)` outside this function for that).\n    \"\"\"\n    ckpt_dir.mkdir(parents=True, exist_ok=True)\n    model.train()\n    if hasattr(model, \"enable_grad_checkpointing\"):\n        model.enable_grad_checkpointing(cfg.grad_checkpoint)\n\n    optimizer = build_optimizer(model, lr=cfg.lr_peak, weight_decay=cfg.weight_decay)\n\n    val_history: list = []\n    stage_start_step: int | None = None  # global step at which THIS stage began\n    if resume_from is not None:\n        state = load_resume_state(resume_from, model, optimizer)\n        if state[\"stage\"] != cfg.name:\n            raise ValueError(\n                f\"resume_from is from stage '{state['stage']}' but cfg is for stage '{cfg.name}'. \"\n                f\"To start a new stage from prior weights, load weights outside train_stage \"\n                f\"(with optimizer=None) and pass a fresh cfg without resume_from.\"\n            )\n        starting_step    = state[\"step\"]\n        starting_tokens  = state[\"tokens\"]\n        skip_docs        = state[\"docs_per_source\"]\n        val_history      = state[\"val_history\"]\n        # Recover the stage anchor so the LR schedule continues from the right\n        # point. Older checkpoints predate this field — fall back to assuming the\n        # stage began here (restarts the schedule, but never crashes).\n        stage_start_step = state.get(\"stage_start_step\")\n        log.info(\"resumed %s from %s at step=%d tokens=%s\",\n                 cfg.name, resume_from.name, starting_step, f\"{starting_tokens:,}\")\n\n    log.info(\"building data loaders (mix=%s)\", cfg.mix.name)\n    train_loader = build_train_loader(\n        mix=cfg.mix, context_length=cfg.context_length,\n        batch_size=cfg.batch_size, skip_docs=skip_docs,\n    )\n    val_loaders  = build_val_loaders(\n        context_length=cfg.context_length, batch_size=cfg.batch_size,\n        val_docs_per_source=cfg.val_docs_per_source,\n    )\n\n    def _on_plateau(payload):\n        log.warning(\"[plateau:%s] best=%.4f current=%.4f — val stopped improving\",\n                    cfg.name, payload[\"best\"], payload[\"current\"])\n        if wandb_run is not None:\n            wandb_run.alert(\n                title=f\"Plateau in {cfg.name}\",\n                text=f\"best={payload['best']:.4f} current={payload['current']:.4f}\",\n            )\n\n    detector = PlateauDetector(patience=5, min_delta=1e-3, cooldown=5, on_fire=_on_plateau)\n\n    # --- stage banner: everything you'd want to reconstruct this run ---------\n    tokens_per_step = cfg.batch_size * cfg.context_length * cfg.grad_accum\n    n_params = model.num_parameters() if hasattr(model, \"num_parameters\") else sum(p.numel() for p in model.parameters())\n    log.info(\"================ STAGE START: %s ================\", cfg.name.upper())\n    log_config(log, f\"stage config [{cfg.name}]\", cfg)\n    log.info(\"mix weights        : %s\", cfg.mix.weights)\n    log.info(\"model params       : %s\", f\"{n_params:,}\")\n    log.info(\"grad checkpointing : %s\", cfg.grad_checkpoint)\n    log.info(\"tokens/opt-step    : %s  (bs=%d x ctx=%d x accum=%d)\",\n             f\"{tokens_per_step:,}\", cfg.batch_size, cfg.context_length, cfg.grad_accum)\n    log.info(\"planned steps      : %d  (~%s tokens this stage)\",\n             cfg.max_steps, f\"{tokens_per_step * cfg.max_steps:,}\")\n    log.info(\"starting global    : step=%d tokens=%s\", starting_step, f\"{starting_tokens:,}\")\n    log.info(\"optimizer          : AdamW(betas=(0.9,0.95), eps=1e-8, fused) wd=%.3g\", cfg.weight_decay)\n    log.info(\"gpu mem (pre-loop) : %s\", gpu_mem_str(device))\n\n    # Per-source token counter (for stage-level data attribution).\n    tokens_per_source = {name: 0 for name in SOURCE_IDS}\n    tokens = starting_tokens\n    step   = starting_step    # global step — logging x-axis + checkpoint metadata\n    # Stage-relative step drives the stop condition + LR schedule. On a fresh\n    # stage it anchors to starting_step (so local starts at 0); on resume it is\n    # recovered from the checkpoint so the schedule continues uninterrupted.\n    stage_start_step = stage_start_step if stage_start_step is not None else starting_step\n    local  = step - stage_start_step\n    train_iter = iter(train_loader)\n\n    # --- graceful-stop wiring (scheduled training) ---------------------------\n    # A wall-clock deadline (cfg.stop_at \"HH:MM\") and SIGTERM/SIGINT both request\n    # a clean stop: finish the in-flight step, save a *resumable* checkpoint, and\n    # exit (without writing the stage's `_final`). The launcher resumes from that\n    # checkpoint next session, so the GPU is freed during the 8-10pm blackout.\n    deadline = _next_deadline(cfg.stop_at)\n    if deadline is not None:\n        log.info(\"stop deadline      : %s (checkpoint + exit then)\", deadline.strftime(\"%Y-%m-%d %H:%M\"))\n    stop_flag  = {\"requested\": False, \"reason\": None}\n    stop_reason: str | None = None\n\n    def _request_stop(signum, _frame):\n        stop_flag[\"requested\"] = True\n        stop_flag[\"reason\"] = signal.Signals(signum).name\n        log.warning(\"received %s — will checkpoint and exit after this step\", stop_flag[\"reason\"])\n\n    prev_handlers = {s: signal.signal(s, _request_stop) for s in (signal.SIGTERM, signal.SIGINT)}\n    stopped_early = False\n\n    t_last  = time.time()\n    t_stage = t_last                  # wall-clock anchor for elapsed/ETA\n    ema_tok_per_sec = None            # smoothed throughput for stable ETA\n    log.info(\"entering training loop at local-step %d / %d\", local, cfg.max_steps)\n    while local < cfg.max_steps:\n        # Honor a graceful-stop request *before* doing work, so the checkpoint we\n        # save reflects exactly the completed steps (counters/cursors consistent).\n        if stop_flag[\"requested\"] or (deadline is not None and datetime.now() >= deadline):\n            stopped_early = True\n            stop_reason = stop_flag[\"reason\"] or \"deadline\"\n            log.warning(\"graceful stop (%s) at local-step %d/%d gstep=%d — checkpointing\",\n                        stop_reason, local, cfg.max_steps, step)\n            break\n\n        lr = lr_for_step(local, cfg)\n        for g in optimizer.param_groups:\n            g[\"lr\"] = lr\n\n        optimizer.zero_grad(set_to_none=True)\n        running_loss = 0.0\n        running_per_source = {name: 0 for name in SOURCE_IDS}\n\n        for _ in range(cfg.grad_accum):\n            x, y, src = next(train_iter)\n            x, y = x.to(device, non_blocking=True), y.to(device, non_blocking=True)\n            with torch.autocast(device_type=device.type, dtype=torch.bfloat16):\n                logits = model(x)\n                loss = F.cross_entropy(logits.flatten(0, 1), y.flatten()) / cfg.grad_accum\n            loss.backward()\n            running_loss += loss.item()\n\n            # Per-source accounting (token count is batch_size * context_length per micro-batch,\n            # all from a single source because batches aren't mixed within a window).\n            for s in src.tolist():\n                running_per_source[ID_TO_SOURCE[s]] += x.shape[1]\n\n        grad_norm = torch.nn.utils.clip_grad_norm_(model.parameters(), cfg.grad_clip)\n        optimizer.step()\n\n        # Accumulate stage-level counters.\n        for name, n in running_per_source.items():\n            tokens_per_source[name] += n\n        tokens += cfg.batch_size * cfg.context_length * cfg.grad_accum\n\n        # Throughput + ETA\n        now = time.time()\n        dt = max(now - t_last, 1e-6)\n        tok_per_sec = tokens_per_step / dt\n        ema_tok_per_sec = tok_per_sec if ema_tok_per_sec is None else 0.9 * ema_tok_per_sec + 0.1 * tok_per_sec\n        t_last = now\n        steps_left = cfg.max_steps - (local + 1)\n        eta_s = steps_left * tokens_per_step / max(ema_tok_per_sec, 1e-6)\n        elapsed_s = now - t_stage\n\n        train_ppl = _safe_ppl(running_loss)\n        metrics = {\n            \"stage\":      cfg.name,\n            \"step\":       step,\n            \"local_step\": local,\n            \"tokens\":     tokens,\n            \"loss\":       running_loss,\n            \"ppl\":        train_ppl,\n            \"lr\":         lr,\n            \"grad_norm\":  float(grad_norm),\n            \"tok_per_sec\": tok_per_sec,\n            \"eta_hours\":  eta_s / 3600.0,\n            **{f\"src_tokens/{k}\": v for k, v in tokens_per_source.items()},\n        }\n        if wandb_run is not None:\n            wandb_run.log(metrics, step=step)\n        log.info(\n            f\"[{cfg.name} {local}/{cfg.max_steps} gstep={step}] \"\n            f\"loss={running_loss:.4f} ppl={train_ppl:,.1f} lr={lr:.2e} \"\n            f\"gnorm={float(grad_norm):.2f} tok/s={tok_per_sec:,.0f} \"\n            f\"elapsed={_fmt_dur(elapsed_s)} eta={_fmt_dur(eta_s)}\"\n        )\n        # Heavier per-step detail goes to the file handler only (DEBUG).\n        log.debug(f\"  tokens={tokens:,} gpu[{gpu_mem_str(device)}] src_tokens={tokens_per_source}\")\n\n        # Evaluation\n        if local > 0 and local % cfg.eval_every == 0:\n            log.info(\"[%s] running eval at gstep=%d (%d batches/source)...\",\n                     cfg.name, step, cfg.eval_batches)\n            t_eval = time.time()\n            val = evaluate_per_domain(model, val_loaders, device, max_batches=cfg.eval_batches)\n            val_history.append({\"step\": step, \"stage\": cfg.name, **val})\n            if wandb_run is not None:\n                val_log = {f\"val/{k}\": v for k, v in val.items()}\n                val_log |= {f\"val_ppl/{k}\": _safe_ppl(v) for k, v in val.items()}\n                val_log[\"stage\"] = cfg.name\n                wandb_run.log(val_log, step=step)\n            per_domain = \"  \".join(f\"{k}={v:.3f}\" for k, v in val.items() if k != \"aggregate\")\n            log.info(\n                f\"[{cfg.name} eval gstep={step}] aggregate={val['aggregate']:.4f} \"\n                f\"(ppl={_safe_ppl(val['aggregate']):,.1f}) took={_fmt_dur(time.time()-t_eval)}  {per_domain}\"\n            )\n            detector.update(val)\n\n        # Periodic inference sample (qualitative progress check)\n        if cfg.sample_every and local % cfg.sample_every == 0:\n            text = generate_sample_text(\n                model, cfg.sample_prompt, device,\n                context_length=cfg.context_length,\n                max_new_tokens=cfg.sample_max_new,\n                temperature=cfg.sample_temperature,\n                top_k=cfg.sample_top_k,\n            )\n            pretty = text.replace(\"<|endoftext|>\", \" ⏎ \")\n            log.info(f\"[{cfg.name} sample gstep={step}] {pretty}\")\n            if wandb_run is not None:\n                wandb_run.log(\n                    {\"train/sample\": wandb.Html(f\"<pre>{pretty}<\/pre>\")},\n                    step=step,\n                )\n\n        # Checkpoint\n        if local > 0 and local % cfg.ckpt_every == 0:\n            path = ckpt_dir / f\"{cfg.model_tag}_{cfg.name}_step{step:06d}.pt\"\n            save_checkpoint(\n                path, model, optimizer, cfg, step, tokens,\n                docs_per_source=train_loader.dataset.docs_consumed,\n                val_history=val_history,\n                stage_start_step=stage_start_step,\n            )\n            log.info(\"saved checkpoint %s (gstep=%d tokens=%s) gpu[%s]\",\n                     path.name, step, f\"{tokens:,}\", gpu_mem_str(device))\n\n        step  += 1\n        local += 1\n\n    # Restore the signal handlers we installed, however we exit the loop.\n    for sig, h in prev_handlers.items():\n        signal.signal(sig, h)\n\n    # Early stop (deadline / SIGTERM): save a resumable step checkpoint and\n    # return WITHOUT the stage-final eval/checkpoint — the stage isn't done.\n    if stopped_early:\n        path = ckpt_dir / f\"{cfg.model_tag}_{cfg.name}_step{step:06d}.pt\"\n        save_checkpoint(\n            path, model, optimizer, cfg, step, tokens,\n            docs_per_source=train_loader.dataset.docs_consumed,\n            val_history=val_history,\n            stage_start_step=stage_start_step,\n        )\n        log.info(\"================ STAGE PAUSED (early stop: %s): %s ================\",\n                 stop_reason, cfg.name.upper())\n        log.info(\"saved resume checkpoint: %s (gstep=%d tokens=%s) gpu[%s]\",\n                 path.name, step, f\"{tokens:,}\", gpu_mem_str(device))\n        log.info(\"local steps run        : %d / %d (stage INCOMPLETE — resume to continue)\",\n                 local, cfg.max_steps)\n        return {\n            \"stage\":             cfg.name,\n            \"stopped_early\":     True,\n            \"reason\":            stop_reason,\n            \"final_step\":        step,\n            \"final_tokens\":      tokens,\n            \"tokens_per_source\": tokens_per_source,\n            \"docs_per_source\":   train_loader.dataset.docs_consumed,\n        }\n\n    # Final eval + checkpoint\n    log.info(\"loop done (ran %d local-steps in %s) — final eval + checkpoint\",\n             local, _fmt_dur(time.time() - t_stage))\n    val = evaluate_per_domain(model, val_loaders, device, max_batches=cfg.eval_batches)\n    val_history.append({\"step\": step, \"stage\": cfg.name, **val})\n    if wandb_run is not None:\n        final_log = {f\"val/{k}\": v for k, v in val.items()}\n        final_log |= {f\"val_ppl/{k}\": _safe_ppl(v) for k, v in val.items()}\n        final_log[\"stage\"] = cfg.name\n        wandb_run.log(final_log, step=step)\n    final_path = ckpt_dir / f\"{cfg.model_tag}_{cfg.name}_final.pt\"\n    save_checkpoint(\n        final_path, model, optimizer, cfg, step, tokens,\n        docs_per_source=train_loader.dataset.docs_consumed,\n        val_history=val_history,\n        stage_start_step=stage_start_step,\n    )\n\n    summary = {\n        \"stage\":             cfg.name,\n        \"stopped_early\":     False,\n        \"final_step\":        step,\n        \"final_tokens\":      tokens,\n        \"tokens_per_source\": tokens_per_source,\n        \"final_val\":         val,\n        \"final_lr\":          lr_for_step(max(local - 1, 0), cfg),\n        \"docs_per_source\":   train_loader.dataset.docs_consumed,\n    }\n    log.info(\"================ STAGE COMPLETE: %s ================\", cfg.name.upper())\n    log.info(\"saved final checkpoint : %s\", final_path.name)\n    log.info(\"local steps run        : %d / %d\", local, cfg.max_steps)\n    log.info(\"final global step      : %d\", step)\n    log.info(\"final tokens (cumul.)  : %s\", f\"{tokens:,}\")\n    log.info(\"tokens this stage      : %s\", f\"{sum(tokens_per_source.values()):,}\")\n    log.info(\"per-source tokens      : %s\", tokens_per_source)\n    log.info(f\"final aggregate val    : {val['aggregate']:.4f} (ppl={_safe_ppl(val['aggregate']):,.1f})\")\n    log.info(\"final lr               : %.3e\", summary[\"final_lr\"])\n    log.info(\"gpu mem (post-loop)    : %s\", gpu_mem_str(device))\n    if local == 0:\n        log.warning(\"ran 0 steps this stage — check max_steps vs. starting_step! \"\n                    \"(this is the bug class that left anneal a no-op)\")\n    return summary\n", "signature": ""}, {"id": "training:_safe_ppl", "label": "_safe_ppl", "kind": "function", "module": "training", "source": "def _safe_ppl(loss: float) -> float:\n    return math.exp(min(loss, 30.0))", "signature": ""}, {"id": "training:_next_deadline", "label": "_next_deadline", "kind": "function", "module": "training", "source": "def _next_deadline(stop_at: str | None, now: datetime | None = None) -> datetime | None:\n    \"\"\"Return the next local datetime matching 'HH:MM' (today if still ahead,\n    else tomorrow). None when no deadline is configured.\n\n    Used by scheduled training so a session started at 22:00 stops by ~19:55\n    the next day, yielding the GPU during the user's 8-10pm blackout.\n    \"\"\"\n    if not stop_at:\n        return None\n    now = now or datetime.now()\n    hh, mm = (int(x) for x in stop_at.split(\":\"))\n    target = now.replace(hour=hh, minute=mm, second=0, microsecond=0)\n    if target <= now:\n        target += timedelta(days=1)\n    return target", "signature": ""}, {"id": "training:_fmt_dur", "label": "_fmt_dur", "kind": "function", "module": "training", "source": "def _fmt_dur(seconds: float) -> str:\n    \"\"\"Human-readable h/m/s, e.g. 3723s -> '1h02m03s'.\"\"\"\n    seconds = int(max(seconds, 0))\n    h, rem = divmod(seconds, 3600)\n    m, s = divmod(rem, 60)\n    if h:\n        return f\"{h}h{m:02d}m{s:02d}s\"\n    if m:\n        return f\"{m}m{s:02d}s\"\n    return f\"{s}s\"", "signature": ""}, {"id": "training:StageConfig", "label": "StageConfig", "kind": "class", "module": "training", "source": "@dataclass\nclass StageConfig:\n    name:            str           # \"pretrain\" | \"anneal\"\n    mix:             StageMix\n    max_steps:       int\n    batch_size:      int     = 2     # v3: 1.5B fits ~21.5GB at bs=2/ctx=2048 (bs=1 fallback if OOM)\n    grad_accum:      int     = 128   # bs2 x ctx2048 x accum128 = 524K tokens/opt-step (== v2 budget)\n    context_length:  int     = 2_048\n    lr_peak:         float   = 3e-4\n    lr_end:          float   = 3e-5\n    warmup_steps:    int     = 1_000\n    schedule:        str     = \"cosine\"   # \"cosine\" (pretrain) or \"linear\" (anneal)\n    weight_decay:    float   = 0.1\n    grad_clip:       float   = 1.0\n    eval_every:      int     = 250\n    eval_batches:    int     = 20\n    ckpt_every:      int     = 500   # v3: 1.5B does far fewer steps/day than v2, so checkpoint more often for crash recovery (prune keeps disk bounded)\n    val_docs_per_source: int = 200\n    grad_checkpoint: bool    = True\n    sample_every:    int     = 500\n    sample_prompt:   str     = \"The quick brown fox\"\n    sample_max_new:  int     = 60\n    sample_top_k:    int     = 50\n    sample_temperature: float = 0.8\n    # v3 additions ----------------------------------------------------------\n    # Checkpoint identity (was hardcoded to v2/0.6B in the engine).\n    model_tag:        str    = \"qwen3_v3\"\n    model_config_ref: str    = \"qwen3_model.QWEN3_CONFIG_1_5B\"\n    # Scheduled-training graceful stop: wall-clock \"HH:MM\" local deadline at\n    # which the loop checkpoints and exits cleanly (None = run to max_steps).\n    stop_at:          str | None = None", "signature": ""}, {"id": "training:build_optimizer", "label": "build_optimizer", "kind": "function", "module": "training", "source": "def build_optimizer(model: nn.Module, lr: float, weight_decay: float) -> torch.optim.Optimizer:\n    \"\"\"Apply weight decay only to matrices (Linear weights), not norms/biases/embeddings.\"\"\"\n    decay, no_decay = [], []\n    for n, p in model.named_parameters():\n        if not p.requires_grad:\n            continue\n        if p.ndim < 2 or \"norm\" in n or \"bias\" in n or \"tok_emb\" in n:\n            no_decay.append(p)\n        else:\n            decay.append(p)\n    groups = [\n        {\"params\": decay,    \"weight_decay\": weight_decay},\n        {\"params\": no_decay, \"weight_decay\": 0.0},\n    ]\n    return torch.optim.AdamW(groups, lr=lr, betas=(0.9, 0.95), eps=1e-8, fused=True)", "signature": ""}, {"id": "training:lr_for_step", "label": "lr_for_step", "kind": "function", "module": "training", "source": "def lr_for_step(step: int, cfg: StageConfig) -> float:\n    if step < cfg.warmup_steps:\n        return cfg.lr_peak * (step + 1) / max(cfg.warmup_steps, 1)\n    progress = (step - cfg.warmup_steps) / max(cfg.max_steps - cfg.warmup_steps, 1)\n    progress = min(max(progress, 0.0), 1.0)\n    if cfg.schedule == \"cosine\":\n        return cfg.lr_end + 0.5 * (cfg.lr_peak - cfg.lr_end) * (1 + math.cos(math.pi * progress))\n    if cfg.schedule == \"linear\":\n        return cfg.lr_peak + (cfg.lr_end - cfg.lr_peak) * progress\n    raise ValueError(f\"unknown schedule: {cfg.schedule}\")", "signature": ""}, {"id": "training:save_checkpoint", "label": "save_checkpoint", "kind": "function", "module": "training", "source": "def save_checkpoint(\n    path:       Path,\n    model:      nn.Module,\n    optimizer:  torch.optim.Optimizer,\n    stage_cfg:  StageConfig,\n    step:       int,\n    tokens:     int,\n    docs_per_source: dict,\n    val_history:list,\n    stage_start_step: int = 0,\n):\n    payload = {\n        \"model\":            model.state_dict(),\n        \"optimizer\":        optimizer.state_dict(),\n        \"stage\":            stage_cfg.name,\n        \"stage_mix\":        stage_cfg.mix.weights,\n        \"stage_cfg\":        asdict(stage_cfg),\n        \"step\":             step,\n        \"stage_start_step\": stage_start_step,\n        \"tokens\":           tokens,\n        \"docs_per_source\":  docs_per_source,\n        \"val_history\":      val_history,\n        \"model_config_ref\": stage_cfg.model_config_ref,\n    }\n    tmp = path.with_suffix(\".tmp\")\n    torch.save(payload, tmp)\n    tmp.replace(path)", "signature": ""}, {"id": "training:stage_cfg_from_dict", "label": "stage_cfg_from_dict", "kind": "function", "module": "training", "source": "def stage_cfg_from_dict(d: dict) -> StageConfig:\n    \"\"\"Rebuild a StageConfig from the dict saved in a checkpoint.\"\"\"\n    d = dict(d)\n    mix_d = d.pop(\"mix\")\n    mix = StageMix(name=mix_d[\"name\"], weights=dict(mix_d[\"weights\"]))\n    return StageConfig(mix=mix, **d)", "signature": ""}, {"id": "training:load_resume_state", "label": "load_resume_state", "kind": "function", "module": "training", "source": "def load_resume_state(\n    path:      Path,\n    model:     nn.Module,\n    optimizer: torch.optim.Optimizer | None = None,\n) -> dict:\n    \"\"\"Load weights + (optionally) optimizer state + training counters.\n\n    Returns a dict with keys: step, tokens, docs_per_source, val_history,\n    stage, stage_cfg (raw dict). Pass `optimizer=None` to load *only* the model\n    weights (use this for --init-from to start a new stage from prior weights).\n    \"\"\"\n    payload = torch.load(path, map_location=\"cpu\", weights_only=False)\n    model.load_state_dict(payload[\"model\"])\n    if optimizer is not None:\n        optimizer.load_state_dict(payload[\"optimizer\"])\n    return {\n        \"step\":             payload[\"step\"],\n        \"stage_start_step\": payload.get(\"stage_start_step\"),\n        \"tokens\":           payload[\"tokens\"],\n        \"docs_per_source\":  payload[\"docs_per_source\"],\n        \"val_history\":      payload.get(\"val_history\", []),\n        \"stage\":            payload[\"stage\"],\n        \"stage_cfg\":        payload.get(\"stage_cfg\"),\n    }", "signature": ""}, {"id": "training:generate", "label": "generate", "kind": "function", "module": "training", "source": "@torch.no_grad()\ndef generate(\n    model:          nn.Module,\n    idx:            torch.Tensor,        # [B, T]\n    max_new_tokens: int,\n    context_size:   int,\n    device:         torch.device,\n    temperature:    float = 0.0,\n    top_k:          int | None = None,\n    eos_id:         int | None = None,\n) -> torch.Tensor:\n    was_training = model.training\n    model.eval()\n    use_amp = device.type == \"cuda\"\n    for _ in range(max_new_tokens):\n        idx_cond = idx[:, -context_size:]\n        if use_amp:\n            with torch.autocast(device_type=device.type, dtype=torch.bfloat16):\n                logits = model(idx_cond)\n        else:\n            logits = model(idx_cond)\n        logits = logits[:, -1, :].float()\n\n        if top_k is not None:\n            top_vals, _ = torch.topk(logits, top_k, dim=-1)\n            cutoff = top_vals[:, -1:].expand_as(logits)\n            logits = torch.where(logits < cutoff, torch.full_like(logits, -float(\"inf\")), logits)\n\n        if temperature > 0.0:\n            probs = torch.softmax(logits / temperature, dim=-1)\n            idx_next = torch.multinomial(probs, num_samples=1)\n        else:\n            idx_next = torch.argmax(logits, dim=-1, keepdim=True)\n\n        if eos_id is not None and (idx_next == eos_id).all():\n            break\n\n        idx = torch.cat([idx, idx_next], dim=1)\n\n    if was_training:\n        model.train()\n    return idx", "signature": ""}, {"id": "training:generate_sample_text", "label": "generate_sample_text", "kind": "function", "module": "training", "source": "def generate_sample_text(\n    model:          nn.Module,\n    prompt:         str,\n    device:         torch.device,\n    context_length: int,\n    max_new_tokens: int = 60,\n    temperature:    float = 0.8,\n    top_k:          int   = 50,\n) -> str:\n    ids = encode(prompt)\n    idx = torch.tensor([ids], dtype=torch.long, device=device)\n    out = generate(\n        model, idx,\n        max_new_tokens=max_new_tokens,\n        context_size=context_length,\n        device=device,\n        temperature=temperature,\n        top_k=top_k,\n        eos_id=eot_id(),\n    )\n    return decode(out[0].cpu().tolist())", "signature": ""}, {"id": "training:train_stage", "label": "train_stage", "kind": "function", "module": "training", "source": "def train_stage(\n    model:           nn.Module,\n    cfg:             StageConfig,\n    device:          torch.device,\n    ckpt_dir:        Path,\n    wandb_run=None,\n    starting_step:   int                  = 0,\n    starting_tokens: int                  = 0,\n    skip_docs:       dict[str, int] | None = None,\n    resume_from:     Path | None           = None,\n) -> dict:\n    \"\"\"Run one stage. Returns final state dict-like summary for handoff.\n\n    `resume_from` continues the SAME stage from a checkpoint: model + optimizer\n    state are loaded, and step/tokens/docs counters are taken from the\n    checkpoint (overriding any starting_* / skip_docs args). The stage must\n    match the checkpoint's stage — pass a fresh `cfg` only when starting a\n    *new* stage seeded from prior weights (use `load_resume_state(...,\n    optimizer=None)` outside this function for that).\n    \"\"\"\n    ckpt_dir.mkdir(parents=True, exist_ok=True)\n    model.train()\n    if hasattr(model, \"enable_grad_checkpointing\"):\n        model.enable_grad_checkpointing(cfg.grad_checkpoint)\n\n    optimizer = build_optimizer(model, lr=cfg.lr_peak, weight_decay=cfg.weight_decay)\n\n    val_history: list = []\n    stage_start_step: int | None = None  # global step at which THIS stage began\n    if resume_from is not None:\n        state = load_resume_state(resume_from, model, optimizer)\n        if state[\"stage\"] != cfg.name:\n            raise ValueError(\n                f\"resume_from is from stage '{state['stage']}' but cfg is for stage '{cfg.name}'. \"\n                f\"To start a new stage from prior weights, load weights outside train_stage \"\n                f\"(with optimizer=None) and pass a fresh cfg without resume_from.\"\n            )\n        starting_step    = state[\"step\"]\n        starting_tokens  = state[\"tokens\"]\n        skip_docs        = state[\"docs_per_source\"]\n        val_history      = state[\"val_history\"]\n        # Recover the stage anchor so the LR schedule continues from the right\n        # point. Older checkpoints predate this field — fall back to assuming the\n        # stage began here (restarts the schedule, but never crashes).\n        stage_start_step = state.get(\"stage_start_step\")\n        log.info(\"resumed %s from %s at step=%d tokens=%s\",\n                 cfg.name, resume_from.name, starting_step, f\"{starting_tokens:,}\")\n\n    log.info(\"building data loaders (mix=%s)\", cfg.mix.name)\n    train_loader = build_train_loader(\n        mix=cfg.mix, context_length=cfg.context_length,\n        batch_size=cfg.batch_size, skip_docs=skip_docs,\n    )\n    val_loaders  = build_val_loaders(\n        context_length=cfg.context_length, batch_size=cfg.batch_size,\n        val_docs_per_source=cfg.val_docs_per_source,\n    )\n\n    def _on_plateau(payload):\n        log.warning(\"[plateau:%s] best=%.4f current=%.4f — val stopped improving\",\n                    cfg.name, payload[\"best\"], payload[\"current\"])\n        if wandb_run is not None:\n            wandb_run.alert(\n                title=f\"Plateau in {cfg.name}\",\n                text=f\"best={payload['best']:.4f} current={payload['current']:.4f}\",\n            )\n\n    detector = PlateauDetector(patience=5, min_delta=1e-3, cooldown=5, on_fire=_on_plateau)\n\n    # --- stage banner: everything you'd want to reconstruct this run ---------\n    tokens_per_step = cfg.batch_size * cfg.context_length * cfg.grad_accum\n    n_params = model.num_parameters() if hasattr(model, \"num_parameters\") else sum(p.numel() for p in model.parameters())\n    log.info(\"================ STAGE START: %s ================\", cfg.name.upper())\n    log_config(log, f\"stage config [{cfg.name}]\", cfg)\n    log.info(\"mix weights        : %s\", cfg.mix.weights)\n    log.info(\"model params       : %s\", f\"{n_params:,}\")\n    log.info(\"grad checkpointing : %s\", cfg.grad_checkpoint)\n    log.info(\"tokens/opt-step    : %s  (bs=%d x ctx=%d x accum=%d)\",\n             f\"{tokens_per_step:,}\", cfg.batch_size, cfg.context_length, cfg.grad_accum)\n    log.info(\"planned steps      : %d  (~%s tokens this stage)\",\n             cfg.max_steps, f\"{tokens_per_step * cfg.max_steps:,}\")\n    log.info(\"starting global    : step=%d tokens=%s\", starting_step, f\"{starting_tokens:,}\")\n    log.info(\"optimizer          : AdamW(betas=(0.9,0.95), eps=1e-8, fused) wd=%.3g\", cfg.weight_decay)\n    log.info(\"gpu mem (pre-loop) : %s\", gpu_mem_str(device))\n\n    # Per-source token counter (for stage-level data attribution).\n    tokens_per_source = {name: 0 for name in SOURCE_IDS}\n    tokens = starting_tokens\n    step   = starting_step    # global step — logging x-axis + checkpoint metadata\n    # Stage-relative step drives the stop condition + LR schedule. On a fresh\n    # stage it anchors to starting_step (so local starts at 0); on resume it is\n    # recovered from the checkpoint so the schedule continues uninterrupted.\n    stage_start_step = stage_start_step if stage_start_step is not None else starting_step\n    local  = step - stage_start_step\n    train_iter = iter(train_loader)\n\n    # --- graceful-stop wiring (scheduled training) -----------   const kindEl = document.getElementById("kind");
  kindEl.textContent = n.kind;
  kindEl.style.background = KIND_COLOR[n.kind];
  document.getElementById("title").textContent = n.module + " · " + n.label;
  const code = document.getElementById("code");
  const pre = document.createElement("pre");
  const c = document.createElement("code");
  c.className = "language-python";
  c.textContent = n.source;
  pre.appendChild(c); code.innerHTML = ""; code.appendChild(pre);
  hljs.highlightElement(c);
  code.scrollTop = 0;
}
network.on("click", p => { if (p.nodes.length) showNode(p.nodes[0]); });

// legend
const legend = document.getElementById("legend");
legend.innerHTML = "<b>nodes</b>" + Object.entries(KIND_COLOR).map(([k,c]) =>
  `<div class="row"><span class="dot" style="background:${c}"></span>${k}</div>`).join("")
  + '<b>edges</b><div class="row"><span style="color:#bbb">━</span> contains</div>'
  + '<div class="row"><span style="color:#4f83cc">━</span> imports</div>'
  + '<div class="row"><span style="color:#e8913a">┅</span> calls</div>';

// search
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) return;
  const hit = DATA.nodes.find(n => (n.module+" "+n.label).toLowerCase().includes(q));
  if (hit) { network.focus(hit.id, { scale:1.1, animation:true }); network.selectNodes([hit.id]); showNode(hit.id); }
});
// layout toggle
let hier = false;
document.getElementById("toggle").addEventListener("click", () => {
  hier = !hier;
  network.setOptions(hier
    ? { layout:{ hierarchical:{ enabled:true, direction:"LR", sortMethod:"directed", levelSeparation:220, nodeSpacing:60 } }, physics:false }
    : { layout:{ hierarchical:{ enabled:false } }, physics:baseOpts.physics });
});
document.getElementById("fit").addEventListener("click", () => network.fit({ animation:true }));
</script>
</body>
</html>
